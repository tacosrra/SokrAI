    - frontend_implementation_plan\n- final_visual_design_blueprint\n- ux_strategy_blueprint\n- current frontend source code\n\nUse the React Doctor skill to identify:\n\n- Unnecessary re-renders\n- Components with unstable props\n- Overly broad state ownership\n- State placed too high in the tree\n- State placed too low in the tree\n- Excessive prop drilling\n- Expensive computations during render\n- Missing memoization where useful\n- Unnecessary memoization where harmful\n- Unstable callbacks\n- Effects with incorrect dependencies\n- Effects doing work that should happen elsewhere\n- Components mixing too many responsibilities\n- Large components that should be split\n- Context providers causing broad re-renders\n- Lists without proper keys or virtualization risks\n- Forms with inefficient state updates\n- Data fetching patterns that may cause waterfalls\n- Loading/error/empty states that cause unstable UI\n- Accessibility regressions caused by component structure\n\nEVIDENCE LEVEL RULE\n\
    \nFor every React or performance issue, classify evidence_level as one of:\n\n- confirmed_issue\n- likely_risk\n- requires_runtime_profiling\n\nDo not claim that a rerender issue is confirmed unless there is clear\ncode evidence or profiling evidence.\n\nIf runtime confirmation is needed, mark it for browser/profiler validation.\n\nARCHITECTURE AUDIT\n\nReview:\n\n- Application shell\n- Layout components\n- Navigation components\n- Shared UI components\n- Domain components\n- Dashboard components\n- Data display components\n- Form components\n- Feedback components\n- State management boundaries\n- Data fetching boundaries\n- Component composition\n\nSCREEN COVERAGE RULE\n\nAudit every implemented screen from frontend_implementation_report.\n\nFor each screen verify:\n\n- Component architecture\n- State boundaries\n- Data fetching boundaries\n- Render risk\n- List/table scalability\n- Form behavior if applicable\n- Loading state stability\n- Error state stability\n- Empty state stability\n\
    - Design fidelity preservation\n\nRENDER PERFORMANCE AUDIT\n\nIdentify:\n\n- Components likely to re-render too often\n- Components with expensive render paths\n- Components receiving unstable object, array or function props\n- Derived data recalculated unnecessarily\n- Lists or tables that may become slow with realistic data volumes\n- Dashboard sections that may need memoization or splitting\n- Interactions that may trigger excessive updates\n\nSTATE MANAGEMENT AUDIT\n\nEvaluate:\n\n- Whether state is colocated appropriately\n- Whether server state and client state are separated clearly\n- Whether global state is justified\n- Whether local UI state is unnecessarily lifted\n- Whether state updates are predictable\n- Whether forms are implemented efficiently\n- Whether optimistic updates, caching or invalidation are needed\n\nEFFECTS AUDIT\n\nIdentify:\n\n- Incorrect dependency arrays\n- Effects used for derived state\n- Effects causing repeated fetches\n- Effects causing render loops\n\
    - Effects that should be replaced by event handlers\n- Effects that should be moved to data fetching utilities\n\nDATA FETCHING AUDIT\n\nReview:\n\n- API call placement\n- Request waterfalls\n- Duplicate requests\n- Loading state behavior\n- Error recovery\n- Caching opportunities\n- Stale data risks\n- Refetch strategy\n\nOVER-OPTIMIZATION GUARDRAIL\n\nDo not recommend memoization unless there is a clear reason.\n\nAvoid unnecessary:\n\n- React.memo\n- useMemo\n- useCallback\n- Premature component splitting\n- Excessive abstraction\n\nPrefer simpler architecture unless the performance or maintainability\nbenefit is clear.\n\nDESIGN FIDELITY PROTECTION\n\nAny proposed technical correction must preserve:\n\n- final_visual_design_blueprint\n- selected visual direction\n- visual hierarchy\n- screen structure\n- interaction strategy\n- responsive behavior\n- accessibility requirements\n\nDo not propose technical changes that reduce the design into a generic UI.\n\nISSUE CLASSIFICATION\n\n\
    For every issue include:\n\n- Issue title\n- Location\n- Category\n- Severity\n- Evidence\n- Evidence level\n- Why it matters\n- Expected user impact\n- Expected performance impact\n- Recommended correction\n- Implementation difficulty\n- Whether it blocks browser QA\n\nOPTIMIZATION PATCH PLAN\n\nFor every recommended optimization include:\n\n- Target files\n- Target components\n- Exact change type\n- Expected benefit\n- Risk of regression\n- Validation required after change\n- Whether the change is safe to automate\n\nSCORECARD\n\nScore each dimension from 1 to 10:\n\n- component_architecture\n- state_colocation\n- render_efficiency\n- data_fetching_efficiency\n- effects_correctness\n- memoization_quality\n- list_and_table_scalability\n- form_performance\n- maintainability\n- design_fidelity_preservation\n\nAPPROVAL LOGIC\n\nSet react_doctor_status to one of:\n\n- approved_for_browser_qa\n- requires_optimization\n- blocked\n\nUse:\n\n- approved_for_browser_qa only if there are no blocking\
    \ issues and all\n  critical scores are >= 8.\n- requires_optimization if issues are fixable and browser QA should wait.\n- blocked if there are severe rendering, state, data fetching or\n  architecture problems that would make browser QA unreliable.\n\nFINAL OUTPUT\n\nMust include:\n\n- react_doctor_summary\n- react_doctor_status\n- scorecard\n- blocking_react_issues\n- non_blocking_react_issues\n- evidence_level_by_issue\n- rerender_risks\n- state_management_issues\n- effects_issues\n- data_fetching_issues\n- component_architecture_issues\n- list_and_table_scalability_risks\n- form_performance_risks\n- recommended_optimizations\n- optimization_priority_order\n- optimization_patch_plan\n- screen_audit_matrix\n- runtime_profiling_recommendations\n- over_optimization_risks\n- browser_qa_readiness_assessment\n- design_fidelity_protection_notes\n- known_limitations\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n\n- old_frontend_was_inspected\n- old_frontend_patterns_reused\n\
    - current_frontend_audited_only_for_new_implementation\n- confidence_of_isolation\n\nProduce a structured artifact named:\n\nreact_doctor_report\n"
