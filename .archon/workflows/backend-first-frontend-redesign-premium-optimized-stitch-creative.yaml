    \ when necessary to identify:\n\n- Framework entry points\n- Build configuration\n- Runtime requirements\n- Routing requirements\n- API integration contracts\n- Required project conventions\n\nPATH-LEVEL INSPECTION RULE\n\nYou may inspect the frontend file tree to identify files, directories,\nentry points and responsibilities that must be removed or replaced.\n\nYou must not read existing UI, component, layout or style implementation\ncontent for inspiration, design decisions or structure reuse.\n\nReading existing frontend content is allowed only when strictly necessary\nto preserve:\n\n- Framework entry points\n- Routing mechanics\n- Build/runtime requirements\n- API integration contracts\n\nSAFE IMPLEMENTATION RULES\n\n- Preserve build, package, config, routing and API integration files unless\n  frontend_implementation_plan explicitly says to replace them.\n- If a file must be removed, ensure the new implementation replaces its\n  required responsibility.\n- Avoid broad destructive\
    \ changes without justification.\n- Keep implementation aligned with existing tooling and project structure.\n- Prefer simple, maintainable React architecture over clever abstractions.\n\nIMPLEMENTATION TRACEABILITY\n\nEvery implemented screen, component and layout decision must be traceable to:\n\n- frontend_implementation_plan\n- final_visual_design_blueprint\n- ux_strategy_blueprint\n- backend_ux_blueprint\n\nIf something cannot be traced, do not implement it unless it is strictly\nrequired by framework, routing, build or runtime mechanics.\n\nIMPLEMENTATION OBJECTIVES\n\nImplement:\n\n- New application shell\n- New layout system\n- New navigation structure\n- New screen structure\n- New reusable components\n- New domain components\n- New dashboard components if required\n- New form/input components if required\n- New feedback, empty, loading and error states\n- New responsive behavior\n- New accessibility foundations\n- New data integration layer according to the plan\n\nDESIGN FIDELITY\n\
    \nThe implementation must follow:\n\n- final_visual_design_blueprint\n- selected visual direction\n- layout principles\n- typography direction\n- color direction\n- component system direction\n- motion direction\n- responsive design direction\n- accessibility visual requirements\n\nDo not downgrade the design into a generic dashboard.\n\nCOMPONENT ARCHITECTURE\n\nImplement components with:\n\n- Clear responsibility boundaries\n- Reusability where useful\n- Minimal unnecessary abstraction\n- Predictable props\n- Good composition\n- Accessible defaults\n- Performance-aware rendering\n\nDATA INTEGRATION\n\nImplement data access according to frontend_implementation_plan.\n\nEnsure:\n\n- API contracts are respected\n- Loading states exist\n- Error states exist\n- Empty states exist\n- Permission states exist when applicable\n- Caching/state strategy follows the plan\n\nRESPONSIVE IMPLEMENTATION\n\nEnsure the frontend works across:\n\n- Desktop\n- Tablet\n- Mobile\n\nAvoid:\n\n- Overflow\n\
