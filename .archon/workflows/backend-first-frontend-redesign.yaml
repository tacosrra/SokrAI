    - Real assistive technology testing
    - User testing with disabled users
    - Complex ARIA widget conformance

    ARTIFACT CAPTURE REQUIREMENTS

    For every tested route and viewport:

    - Record the tested URL.
    - Record the tested viewport.
    - Capture accessibility tree snapshot evidence where useful.
    - Capture DOM/browser snapshot evidence where useful.
    - Record keyboard navigation observations.
    - Record whether the route was fully testable.

    Use stable artifact naming:

