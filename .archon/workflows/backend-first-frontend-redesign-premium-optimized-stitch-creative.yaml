name: backend-first-frontend-redesign-premium-optimized-stitch-creative
description: Backend-first premium frontend redesign. Uses Stitch MCP to inspect a creative premium reference project (Remix of Interview Mode Selection) and translate its strongest ideas into SokrAI without copying or constraining visual creativity.
provider: codex
model: gpt-5.5
modelReasoningEffort: medium
interactive: true
nodes:
- id: discovery
  name: Product & UX Discovery
  loop:
    prompt: "You are the discovery phase of a backend-first frontend design workflow.\n\nYou are running as an interactive loop. You must gather all required product,\nuser, business, UX and technical context before the workflow continues.\n\nCURRENT USER FEEDBACK / ANSWERS FROM INTERACTIVE GATE:\n$LOOP_USER_INPUT\n\nPREVIOUS LOOP OUTPUT:\n$LOOP_PREV_OUTPUT\n\nIMPORTANT RULES:\n\n- You are NOT allowed to inspect, analyze, critique, review or use any\n  existing frontend implementation.\n- The future design must be created entirely from user answers, product goals,\n  backend architecture, target users and business requirements.\n- Never make assumptions.\n- If information is missing, ask.\n- If something is ambiguous, clarify.\n- If something could influence UX decisions, ask.\n- Do not analyze backend yet.\n- Do not design UX yet.\n- Do not design UI yet.\n\nINTERACTION PROTOCOL:\n\n- If no useful user answers have been provided yet, ask a complete but concise\n  checklist of questions\
      \ and do NOT output the completion promise.\n- After each user response, identify remaining gaps.\n- Continue asking follow-up questions only for gaps that are relevant.\n- Stop only when all blocking unknowns are resolved or explicitly accepted as\n  unknown by the user.\n- When the discovery is complete, output only the final discovery_report JSON\n  object followed by the completion promise: <promise>DISCOVERY_COMPLETE</promise>\n\nAreas that must be covered:\n\n1. Product vision and goals\n2. User types and personas\n3. User technical expertise\n4. User pain points\n5. Core workflows\n6. Business objectives\n7. Success metrics\n8. Platforms and devices\n9. Accessibility requirements\n10. Visual preferences\n11. Branding constraints\n12. Data density expectations\n13. Security considerations\n14. Integrations\n15. Performance expectations\n16. Real-time requirements\n17. Future scalability requirements\n\nFinal discovery_report JSON must include:\n\n- product_summary\n- target_users\n\
      - user_pain_points\n- core_workflows\n- required_screens\n- critical_data\n- ux_priorities\n- visual_direction\n- technical_constraints\n- performance_expectations\n- accessibility_requirements\n- integrations\n- blocking_unknowns\n- non_blocking_unknowns\n- explicit_user_preferences\n- forbidden_assumptions\n- readiness_score\n\nIf blocking unknowns remain, do not complete. Ask the next focused set of\nquestions instead."
    until: DISCOVERY_COMPLETE
    max_iterations: 6
    fresh_context: true
    interactive: true
    gate_message: Answer the discovery questions above. If you believe all context is now complete, say so explicitly; otherwise provide the missing product, user, UX, technical and business details.
- id: graphify-codebase-map
  name: Graphify Codebase Map
  depends_on:
  - discovery
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: medium
  context: fresh
  prompt: "You are the Graphify codebase mapping phase of a backend-first frontend design workflow.\n\nYour mission is to create or refresh a concise, queryable Graphify-based map of the repository before backend analysis and frontend implementation planning begin.\n\nThis node may create or refresh Graphify artifacts, but it must not modify application source code.\n\nIMPORTANT RULES\n\n- Do not design UX.\n- Do not design UI.\n- Do not implement frontend code.\n- Do not modify application source files.\n- Do not inspect old frontend UI, component, layout or style content for inspiration.\n- Do not use existing frontend UX/UI as product context.\n- Existing frontend implementation remains contaminated context.\n- Use Graphify for repository navigation and technical orientation only.\n\nINPUTS\n\nUse:\n\n- discovery_report:\n  $discovery.output\n- current repository\n- existing Graphify artifacts if present\n\nGRAPHIFY AVAILABILITY CHECK\n\nDetermine whether Graphify is available in the\
    \ repository.\n\nCheck safely for:\n\n- Existing graphify output directories or files.\n- Project scripts that run Graphify.\n- Installed Graphify CLI or project dependency.\n- Existing graph.html, GRAPH_REPORT.md, graph.json or equivalent artifacts.\n\nDo not install new dependencies unless the repository already defines Graphify as a project dependency or script and the install/update is part of normal project setup.\n\nGRAPHIFY EXECUTION RULE\n\nIf Graphify is available and safe to run:\n\n- Refresh or create the Graphify graph.\n- Prefer project-defined scripts over guessing commands.\n- Keep generated artifacts in the repository's expected Graphify output location.\n- Do not modify application source code.\n\nIf Graphify is not available or cannot run safely:\n\n- Do not fail the workflow solely because Graphify is unavailable.\n- Produce a best-effort codebase map using safe repository navigation.\n- Mark graphify_available as false.\n- Document limitations clearly.\n\nFRONTEND\
    \ CONTAMINATION CONTROL\n\nGraphify may reveal frontend files in the repository graph.\n\nYou may use frontend-related graph information only to identify:\n\n- Frontend technical entry points.\n- Framework setup.\n- Build configuration.\n- Routing mechanics.\n- Package/dependency boundaries.\n- Files/directories that may need replacement later.\n\nYou must not use Graphify to learn from or preserve:\n\n- Existing frontend UX decisions.\n- Existing frontend UI decisions.\n- Existing screen layouts.\n- Existing component structure.\n- Existing styling.\n- Existing design system choices.\n- Existing visual hierarchy.\n- Existing navigation patterns, except where required by framework routing mechanics.\n\nIf Graphify exposes frontend design information accidentally, ignore it.\n\nREPOSITORY MAP OBJECTIVES\n\nUse Graphify artifacts and safe targeted inspection to identify:\n\n- Backend entry points.\n- API routes and controllers.\n- Database/schema files.\n- Domain entities.\n- Service boundaries.\n\
    - Business logic modules.\n- Auth/permission modules.\n- Infrastructure/config files.\n- Build/test/package commands.\n- Dependency hotspots.\n- Cross-cutting modules.\n- Frontend technical entry points only.\n\nGRAPHIFY OUTPUT SIZE CONTROL\n\nDo not copy large graph.json contents into the final output.\n\nProduce a concise map with references, paths and recommended queries.\n\nPrefer:\n\n- Important paths.\n- Important modules.\n- Important relationships.\n- High-value Graphify queries for later nodes.\n- Limitations and confidence notes.\n\nDo not produce a huge raw graph dump.\n\nLATER NODE HANDOFF\n\nPrepare a map that helps later nodes inspect the repository efficiently without broad file scans.\n\nFor later nodes, recommend targeted Graphify-guided queries for:\n\n- Backend/domain analysis.\n- API and data contract analysis.\n- Implementation planning.\n- Frontend technical replacement boundaries.\n- React component audit of the new implementation.\n- Consolidated fix implementation.\n\
    \nFINAL OUTPUT\n\nMust include:\n\n- graphify_available\n- graphify_graph_refreshed\n- graphify_command_used\n- graphify_artifacts_found\n- graphify_artifacts_created\n- graphify_artifact_paths\n- backend_entry_points\n- api_entry_points\n- domain_model_candidates\n- database_schema_candidates\n- service_boundary_candidates\n- auth_permission_candidates\n- infrastructure_config_candidates\n- build_test_commands_detected\n- dependency_hotspots\n- frontend_technical_entry_points_only\n- frontend_contamination_risk_notes\n- recommended_graphify_queries_for_later_nodes\n- graphify_usage_rules_for_later_nodes\n- graphify_limitations\n- confidence_level\n\nfrontend_bias_check must contain:\n\n- frontend_was_used_for_design\n- frontend_ui_content_analyzed\n- frontend_artifacts_used_only_for_technical_boundaries\n- frontend_contamination_risk\n- confidence_of_isolation\n\nProduce a structured artifact named:\n\ngraphify_codebase_map"
  output_format:
    type: object
    properties:
      summary:
        type: string
      details:
        type: string
      artifacts:
        type: array
        items:
          type: string
      next_step:
        type: string
    required:
    - summary
    - details
    - artifacts
    - next_step
    additionalProperties: false
- id: backend-blueprint
  name: Backend UX Blueprint
  depends_on:
  - graphify-codebase-map
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "\n      GRAPHIFY USAGE RULE\n\n      Use graphify_codebase_map and available Graphify artifacts to navigate the\n      repository efficiently before reading files directly.\n\n      Prefer targeted inspection guided by the graph over broad repository scans.\n\n      Use Graphify for repository navigation, backend/domain understanding,\n      technical entry points, dependency relationships and implementation boundaries.\n\n      Do not use Graphify to learn from existing frontend UX, layout, styling,\n      component structure, navigation patterns or design decisions.\n\n      Existing frontend remains contaminated context.\n\n      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      discovery_report:\n      $discovery.output\n\n      graphify_codebase_map:\n      $graphify-codebase-map.output\n\nYou are the backend analysis phase of a backend-first frontend design\
    \ workflow.\n\nYour mission is to deeply understand the product exclusively through:\n- discovery_report\n- Backend source code\n- APIs\n- Database models\n- Domain entities\n- Business logic\n- Permissions\n- Infrastructure constraints\n\nFRONTEND ISOLATION POLICY\n\nThe existing frontend is contaminated context.\n\nYou must not:\n- Read frontend source code\n- Read frontend components\n- Read frontend pages\n- Read frontend layouts\n- Read frontend routes\n- Read frontend styling\n- Read frontend screenshots\n- Read frontend design systems\n- Read frontend documentation\n- Read frontend tests\n- Read frontend architecture documents\n\nIf frontend information is encountered accidentally, ignore it completely.\n\nAssume the existing frontend does not exist.\n\nAnalyze:\n- Domain model\n- Entity relationships\n- Entity lifecycles\n- Business rules\n- User roles\n- Permissions\n- Backend-supported workflows\n- Critical user actions\n- Important data surfaces\n- State transitions\n- Error\
    \ states\n- Real-time requirements\n- Performance constraints\n- Design implications\n\nDo not propose visual solutions yet.\nDo not design screens.\nDo not design layouts.\nDo not design components.\nDo not design navigation.\n\nFinal output must include:\n- domain_model\n- entity_relationships\n- entity_lifecycles\n- business_rules\n- user_roles\n- permissions_matrix\n- workflows\n- critical_user_actions\n- important_data_surfaces\n- data_density_analysis\n- state_transition_map\n- error_state_catalog\n- realtime_requirements\n- performance_constraints\n- design_implications\n- frontend_design_recommendations\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n- frontend_was_analyzed\n- frontend_artifacts_used\n- frontend_assumptions_made\n- confidence_of_isolation\n\nProduce a structured artifact named backend_ux_blueprint.\n"
  output_format:
    type: object
    properties:
      summary:
        type: string
      details:
        type: string
      artifacts:
        type: array
        items:
          type: string
      next_step:
        type: string
    required:
    - summary
    - details
    - artifacts
    - next_step
    additionalProperties: false
- id: ux-strategy
  name: UX Strategy & Information Architecture
  depends_on:
  - backend-blueprint
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      discovery_report:\n      $discovery.output\n\n      backend_ux_blueprint:\n      $backend-blueprint.output\n\nYou are the UX strategy and information architecture phase of a\nbackend-first frontend design workflow.\n\nTransform discovery_report and backend_ux_blueprint into a complete\nUX strategy.\n\nIMPORTANT RULES:\n- Do not inspect the existing frontend.\n- Do not reuse current UI patterns.\n- Do not design visual style yet.\n- Do not create final screens yet.\n- Do not write frontend code yet.\n- Do not invent unsupported features, screens or workflows.\n\nEvery UX decision must be traceable to:\n- discovery_report\n- backend_ux_blueprint\n- explicit user goals\n- backend-supported capabilities\n- business requirements\n\nProduce:\n- User journeys\n- Navigation model\n- Information architecture\n- Screen\
    \ inventory\n- Interaction strategy\n- Dashboard strategy\n- Empty/error/loading/permission state strategy\n- UX prioritization\n- Handoff to visual design\n\nFinal output must include:\n- ux_strategy_summary\n- user_journeys\n- navigation_model\n- information_architecture\n- screen_inventory\n- interaction_strategy\n- dashboard_strategy\n- empty_state_strategy\n- error_state_strategy\n- loading_state_strategy\n- permission_state_strategy\n- ux_priorities\n- traceability_matrix\n- confidence_by_decision\n- speculative_items\n- risks_and_tradeoffs\n- visual_design_handoff\n- open_questions_for_visual_design\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n- frontend_was_analyzed\n- frontend_artifacts_used\n- frontend_assumptions_made\n- confidence_of_isolation\n\nProduce a structured artifact named ux_strategy_blueprint.\n"
  output_format:
    type: object
    properties:
      summary:
        type: string
      details:
        type: string
      artifacts:
        type: array
        items:
          type: string
      next_step:
        type: string
    required:
    - summary
    - details
    - artifacts
    - next_step
    additionalProperties: false
- id: premium-visual-concept-generation
  name: Creative Premium Visual Concept Generation with Stitch Reference
  depends_on:
  - ux-strategy
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "STITCH MCP ENABLED — CREATIVE PREMIUM VISUAL CONCEPT NODE\n\nThis node is the only high-creativity visual concepting stage before implementation.\nUse Stitch as a premium visual inspiration source and high-fidelity design reference, while preserving SokrAI product constraints.\nDo not implement code in this node.\n\nUPSTREAM NODE OUTPUTS\n\ndiscovery_report:\n$discovery.output\n\ngraphify_codebase_map:\n$graphify-codebase-map.output\n\nbackend_ux_blueprint:\n$backend-blueprint.output\n\nux_strategy_blueprint:\n$ux-strategy.output\n\nMISSION\n\nCreate a high-fidelity, implementation-ready visual direction for SokrAI that is clearly more premium, professional and product-ready than a basic form prototype.\nThe concept should be creatively ambitious. Do not over-constrain the visual design into a checklist-only result. Use the reference project to inspire better composition, craft and polish, not to force a copy.\n\nSTRICT BACKEND-FIRST ISOLATION\n\n- Do not inspect existing frontend\
    \ source, screenshots, layouts, styles, components, navigation or UI behavior for visual inspiration.\n- Existing frontend implementation is contaminated context.\n- You may use frontend technical entry points only if they appear in graphify_codebase_map as replacement/build targets.\n- Product truth comes from discovery_report, backend_ux_blueprint, ux_strategy_blueprint and backend constraints.\n- Do not introduce unsupported product features.\n- Report/PDF UI must remain final-phase only.\n- Debug/audit/technical internals must not appear in normal UI at all, not even collapsed or hidden in normal-user disclosure controls.\n\nSTITCH PROJECTS TO USE\n\nUse Stitch MCP if available.\n\nRequired Stitch reference project:\n- \"Remix of Interview Mode Selection\"\n\nTarget Stitch project, if available:\n- \"SokrAI Premium Visual Concept\"\n\nProcess:\n1. Locate and inspect \"Remix of Interview Mode Selection\".\n   - Treat it as a premium visual reference generated/refined inside Stitch.\n\
    \   - If the exact project is not found, look for the closest available \"Interview Mode Selection\" project, but explicitly report the fallback.\n   - Do not pretend the exact project was used if it was not found.\n\n2. Locate and inspect \"SokrAI Premium Visual Concept\", if it exists.\n   - Use it as the current target concept to improve.\n   - If it does not exist or cannot be edited, continue by writing repo design artifacts.\n\n3. Extract transferable visual ideas from the reference project:\n   - screen composition and layout gravity;\n   - chat/conversation workspace treatment;\n   - composer/input treatment;\n   - prompt/question presentation;\n   - typography hierarchy;\n   - spacing rhythm;\n   - premium surface treatment;\n   - CTA hierarchy;\n   - phase/current-state treatment;\n   - guidance/context panel treatment;\n   - microcopy and state polish;\n   - professional finishing details.\n\n4. Do NOT copy blindly.\n   - Do not copy product semantics that do not belong to\
    \ SokrAI.\n   - Do not import dashboard/report widgets into the active interview.\n   - Do not import scoring/maturity widgets into the active interview unless they are transformed into phase-local guidance without report readiness.\n   - Do not import excessive navigation or admin/dashboard structure.\n   - Do not import technical/debug/admin patterns.\n\n5. Preserve creative freedom.\n   - The reference project is inspiration, not a template.\n   - You may propose a distinct SokrAI-specific visual direction if it is more appropriate.\n   - Favor professional originality over literal imitation.\n   - The final concept should feel designed, high-end and healthcare-appropriate, not copied.\n\n6. If Stitch MCP supports write/edit operations and credentials allow it:\n   - improve or create SokrAI concept screens inside \"SokrAI Premium Visual Concept\";\n   - preserve the target product constraints;\n   - report exactly what was updated.\n\n7. If Stitch MCP is read-only or writing fails:\n\
    \   - do not block;\n   - inspect Stitch screens/screenshots/HTML/design DNA as available;\n   - create or update repo design artifacts from the inspected visual reference;\n   - clearly state that Stitch was used as inspected visual reference, not as a saved target project edit.\n\nIMPORTANT MODEL CLAIM RULE\n\nDo not claim Archon/Codex is using Gemini 3.1 Pro.\nYou may say that the reference Stitch project appears to be the selected visual source, and that any model selection inside Stitch belongs to Stitch. If model metadata is not exposed by MCP, say it is unknown.\n\nSOKRAI PRODUCT CONSTRAINTS\n\n- Conversation-first active interview.\n- Current question and answer composer are the main surface.\n- Phase rail supports progress but does not dominate.\n- Current gaps and guidance are secondary.\n- Report/PDF preview, readiness and export actions appear only in the final report/export phase.\n- No report readiness during active interview.\n- No debug/audit/technical internals in normal\
    \ UI, not even collapsed.\n- No raw model output, request IDs, logs, hashes, schema versions, n8n/Ollama/Fastify/PostgreSQL internals or workflow metadata in normal UI.\n- No generic SaaS dashboard.\n- No basic form prototype.\n- No clinical/legal/regulatory/medical-device approval claims.\n- Calm, premium, precise, healthcare-appropriate visual tone.\n- Accessibility cannot be sacrificed for visual polish.\n- Performance cannot be sacrificed for decorative UI.\n\nPREMIUM QUALITY BAR\n\nExplicitly reject:\n- Default browser-looking forms.\n- Large naked textareas as the dominant design idea.\n- Naked white pages with centered forms.\n- Generic SaaS dashboard card grids.\n- AI gradient/glassmorphism decoration as primary hierarchy.\n- Technical/admin console appearance.\n- Random whitespace with no rhythm.\n- Weak header/product identity.\n- Inputs/buttons that look unstyled.\n- Report/PDF/readiness UI during the active interview flow.\n\nDefine what \"premium enough\" means for SokrAI:\n\
    - Calm, healthcare-appropriate, precise and guided.\n- Conversation-first active flow.\n- Current question and composer are visually dominant.\n- Supporting context is secondary and one click away.\n- Safety notice is compact but readable.\n- Final report feels like a formal pilot-readiness dossier, not an approval certificate.\n- Accessibility, focus states and reduced motion are built into the visual system.\n\nOUTPUT REQUIREMENTS\n\nProduce one artifact named premium_visual_concept_blueprint with:\n\n1. stitch_reference_review\n   - exact Stitch projects found;\n   - exact screens/views inspected;\n   - whether target project was editable;\n   - whether write/edit was attempted and result;\n   - explicit fallback if the exact reference project was not found.\n\n2. premium_ideas_bank\n   - visual ideas extracted from the reference project;\n   - which ideas are transferable to SokrAI;\n   - which ideas were rejected and why.\n\n3. creative_design_direction\n   - name;\n   - summary;\n\
    \   - what makes it premium;\n   - how it differs from the reference project;\n   - why it fits SokrAI rather than copying the reference.\n\n4. high_fidelity_screen_briefs\n   For each screen, describe hierarchy, layout, component anatomy, density, visual rhythm, states and responsive behavior:\n   - New proposal / intake.\n   - Active interview workspace.\n   - Context surface with phase/gaps/recent/recovery.\n   - Final report/export phase.\n   - Loading, stale, retry, unavailable and error states.\n\n5. visual_quality_bar\n   - too_basic_fail_conditions;\n   - premium_acceptance_conditions;\n   - screenshot-level checks.\n\n6. anti_basic_ui_checklist\n   - explicit implementation checks.\n\n7. accessibility_design_checks\n   - keyboard;\n   - focus restoration;\n   - status announcements;\n   - semantic headings;\n   - contrast;\n   - reduced motion;\n   - mobile focus handling.\n\n8. final_report_visibility_matrix\n   - active interview: all report/PDF/export/readiness UI hidden;\n\
    \   - premature direct route: unavailable state with return action;\n   - final phase ready: prepare report visible;\n   - preview available: export visible with review-not-approval framing.\n\n9. backend_to_ui_state_map\n   Map backend states to plain-language UI states without exposing internals.\n\n10. visual_critique_and_self_revision\n   Critique your own concept against the quality bar and apply corrections before finalizing.\n\n11. implementation_handoff_notes\n   - concrete design rules;\n   - tokens that must exist;\n   - component craft requirements;\n   - anti-regression notes for implementation.\n\n12. approval_readiness\n   - readiness score;\n   - remaining low-risk open decisions;\n   - implementation risks.\n\nReturn a concise but implementation-useful structured artifact. Do not write code.\n"
  output_format:
    type: object
    properties:
      summary:
        type: string
      details:
        type: string
      artifacts:
        type: array
        items:
          type: string
      next_step:
        type: string
    required:
    - summary
    - details
    - artifacts
    - next_step
    additionalProperties: false
  mcp: .archon/mcp/stitch.json
- id: visual-design-token-contract
  name: Visual Design Token & High-Fidelity Implementation Contract
  depends_on:
  - premium-visual-concept-generation
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  prompt: "UPSTREAM NODE OUTPUTS\n\ndiscovery_report:\n$discovery.output\n\nbackend_ux_blueprint:\n$backend-blueprint.output\n\nux_strategy_blueprint:\n$ux-strategy.output\n\npremium_visual_concept_blueprint:\n$premium-visual-concept-generation.output\n\nYou are the design-token and implementation contract phase.\n\nYour job is to convert the premium visual concept into a concrete, implementation-ready design contract so the implementation node cannot produce a basic form prototype.\n\nIMPORTANT RULES\n\n- Do not inspect existing frontend design/source for inspiration.\n- Do not modify code in this node.\n- Do not broaden product scope.\n- Report/PDF controls remain final-phase only.\n- Debug/audit/technical details remain hidden from normal UI.\n- The contract must make color changes easy after implementation.\n\nOUTPUT MUST INCLUDE\n\n1. Concrete semantic tokens:\n   - color tokens;\n   - typography tokens;\n   - spacing tokens;\n   - radius tokens;\n   - border tokens;\n   - focus tokens;\n\
    \   - motion tokens;\n   - shadow/elevation rules if any.\n\n2. Token centralization contract:\n   - where tokens should live;\n   - no hardcoded color scatter;\n   - no inline color styles;\n   - no arbitrary one-off colors unless mapped to tokens;\n   - palette must be changeable by editing centralized tokens.\n\n3. Component craft specifications:\n   - header/top band;\n   - phase marker;\n   - current question block;\n   - composer/textarea;\n   - primary CTA;\n   - safety notice;\n   - context surface;\n   - recent session rows;\n   - final report dossier;\n   - loading/recovery/error states.\n\n4. Screen composition specs:\n   - desktop layout;\n   - mobile layout;\n   - responsive compression rules;\n   - vertical rhythm;\n   - alignment rules.\n\n5. Anti-regression acceptance criteria:\n   - UI must not look like default browser forms;\n   - UI must not look like a generic SaaS dashboard;\n   - UI must not look like a plain centered form prototype;\n   - UI must feel production-quality\
    \ in browser screenshots;\n   - report/export stays final-phase only;\n   - debug/audit/technical details stay out of normal UI.\n\n6. Implementation handoff:\n   - files/areas likely to change, based on graphify/backend map only;\n   - route/state assumptions;\n   - test/validation commands to prefer;\n   - explicit no-go list.\n\nProduce final_visual_design_contract.\n\nCREATIVE STITCH REFERENCE RULE\n\nPreserve the creative direction from Stitch-inspired concepting while making tokens and component rules concrete enough to implement. The reference project is inspiration, not a template. Do not flatten the design into a generic form or dashboard.\n"
  output_format:
    type: object
    properties:
      summary:
        type: string
      details:
        type: string
      artifacts:
        type: array
        items:
          type: string
      next_step:
        type: string
    required:
    - summary
    - details
    - artifacts
    - next_step
    additionalProperties: false
- id: approve-final-visual-design
  name: Human Approval Gate - Final Visual Design
  depends_on:
  - visual-design-token-contract
  approval:
    message: 'Review final_visual_design_blueprint before implementation begins.


      Approve only if:

      - The design direction is aligned with the product vision.

      - The design feels sufficiently ambitious and premium.

      - The UX structure is preserved.

      - No existing frontend bias influenced the result.

      - The implementation handoff is clear enough for the next node.


      Final visual design artifact for review:

      premium_visual_concept_blueprint:

      $premium-visual-concept-generation.output


      visual_design_token_contract:

      $visual-design-token-contract.output


      Reply with approval, rejection, or notes. Your response will be captured and passed to the implementation planning node.



      Approve only if the high-fidelity direction is visually strong enough to implement and cannot degrade into a basic form prototype. Review the visual-design-token-contract and the Stitch reference review, creative visual concept, and token contract, not just the textual UX strategy.'
    capture_response: true
- id: frontend-implementation-plan
  name: Frontend Implementation Plan
  depends_on:
  - approve-final-visual-design
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "SPEED AND TOKEN CONTROL\n\nUse graphify_codebase_map and the explicit design contract. Do not broadly rescan the repository. Inspect only files needed to plan or implement the approved frontend. Reuse repo-native scripts and do not run dependency installation unless dependencies are missing.\n\n      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      discovery_report:\n      $discovery.output\n\n      graphify_codebase_map:\n      $graphify-codebase-map.output\n\n      backend_ux_blueprint:\n      $backend-blueprint.output\n\n      ux_strategy_blueprint:\n      $ux-strategy.output\n\n      final_visual_design_contract:\n      $visual-design-token-contract.output\n\n      premium_visual_concept_blueprint:\n      $premium-visual-concept-generation.output\n\n      premium_visual_concept_blueprint_duplicate_reference:\n      $premium-visual-concept-generation.output\n\
