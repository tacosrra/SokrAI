- id: final-regression-qa
  name: Final Regression QA
  depends_on:
  - consolidated-fix-implementation
  always_run: true
  mcp: .archon/mcp/chrome-devtools.json
  trigger_rule: all_done
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "FINAL REGRESSION RULE\n\nVerify the final browser experience against the premium visual contract and the parallel QA fix plan. This node is read-only and should not re-run broad analysis unless needed to validate regressions.\n\n      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      graphify_codebase_map:\n      $graphify-codebase-map.output\n\n      consolidated_qa_fix_plan:\n      $consolidated-qa-fix-plan.output\n\n      consolidated_fix_implementation_report:\n      $consolidated-fix-implementation.output\n\n      frontend_implementation_report:\n      $frontend-implementation.output\n\n      frontend_implementation_plan:\n      $frontend-implementation-plan.output\n\n      final_visual_design_blueprint:\n      $visual-design-token-contract.output\n\n      ux_strategy_blueprint:\n      $ux-strategy.output\n\n      react_doctor_report:\n      $react-doctor-audit.output\n\
    \n      chrome_visual_premium_qa_report:\n      $chrome-visual-premium-qa.output\n\n      browser_performance_qa_report:\n      $browser-performance-qa.output\n\n      accessibility_qa_report:\n      $accessibility-qa.output\n\nYou are the final regression QA phase of a backend-first frontend design\nworkflow.\n\nYour mission is to verify that the fixes implemented by\nconsolidated-fix-implementation resolved the planned QA issues without\nintroducing regressions.\n\nThis node does not modify files.\n\n\n      GRAPHIFY USAGE RULE\n\n      Use graphify_codebase_map and available Graphify artifacts to navigate the\n      repository efficiently before reading files directly.\n\n      Prefer targeted inspection guided by the graph over broad repository scans.\n\n      Use Graphify for repository navigation, backend/domain understanding,\n      technical entry points, dependency relationships and implementation boundaries.\n\n      Do not use Graphify to learn from existing frontend UX, layout,\
    \ styling,\n      component structure, navigation patterns or design decisions.\n\n      Existing frontend remains contaminated context.\n\nIMPORTANT RULES\n\n- Do not implement fixes.\n- Do not modify files.\n- Do not redesign the product.\n- Do not reinterpret the approved visual direction.\n- Do not inspect old frontend code.\n- Do not use old frontend behavior as a reference.\n- Do not introduce new product requirements.\n- Your responsibility is final validation and release readiness reporting.\n\nINPUTS\n\nUse:\n\n- consolidated_qa_fix_plan\n- consolidated_fix_implementation_report\n- frontend_implementation_report\n- frontend_implementation_plan\n- final_visual_design_blueprint\n- ux_strategy_blueprint\n- react_doctor_report\n- chrome_visual_qa_report\n- browser_performance_qa_report\n- accessibility_qa_report\n- current frontend implementation\n\nFINAL REGRESSION OBJECTIVE\n\nValidate:\n\n- Planned fixes were applied.\n- Canonical QA issues were resolved.\n- No new critical issues\
    \ were introduced.\n- Build, lint, typecheck and tests remain healthy where available.\n- Visual design fidelity is preserved.\n- UX structure is preserved.\n- React architecture did not regress.\n- Browser visual quality did not regress.\n- Browser performance did not regress.\n- Accessibility did not regress.\n- The frontend remains isolated from old frontend bias.\n\nEXECUTION GATE\n\nInspect readiness_for_final_regression_qa from\nconsolidated_fix_implementation_report.\n\nIf readiness_for_final_regression_qa indicates:\n\n- ready:\n  Continue final regression QA.\n\n- partial:\n  Continue final regression QA, but clearly mark unresolved items and\n  partial validation scope.\n\n- blocked:\n  Do not perform broad regression QA.\n  Produce a blocked final regression report explaining why.\n\nFIX PLAN COMPLIANCE CHECK\n\nVerify that consolidated_fix_implementation_report accurately reflects\nthe real current implementation.\n\nFor every planned fix from consolidated_qa_fix_plan:\n\n\
    - Confirm whether it was actually implemented.\n- Confirm whether it resolves the canonical issue.\n- Confirm whether validation evidence supports the claimed resolution.\n- Identify mismatches between claimed fixes and observed behavior.\n- Identify fixes that were skipped, partially applied or applied\n  differently than planned.\n\nSTATIC VALIDATION\n\nDiscover and run the strongest safe validation commands available:\n\n- lint\n- typecheck\n- build\n- tests\n- format check if available\n- accessibility test scripts if available\n- frontend-specific test suites if available\n\nIf a command is unavailable, document it.\n\nIf a command fails:\n\n- Identify the failing command.\n- Summarize the failure.\n- Link the failure to changed areas where possible.\n- Mark whether it blocks release.\n- Do not attempt to fix it.\n\nFIX VERIFICATION\n\nFor every canonical issue ID from consolidated_qa_fix_plan:\n\nVerify whether it is:\n\n- resolved\n- partially_resolved\n- unresolved\n- not_testable\n\
    - replaced_by_new_issue\n\nFor each issue include:\n\n- Canonical issue ID\n- Original severity\n- Fix batch\n- Validation method\n- Evidence\n- Current status\n- Remaining risk\n- Whether release is blocked\n\nREGRESSION DETECTION\n\nCheck whether the fixes introduced new issues in:\n\n- Build/runtime behavior\n- Routing\n- Navigation\n- Layout\n- Responsive behavior\n- Visual hierarchy\n- Component behavior\n- State management\n- Data fetching\n- Loading states\n- Empty states\n- Error states\n- Forms\n- Dialogs/drawers/menus\n- Keyboard navigation\n- Focus management\n- Accessibility semantics\n- Performance\n- Network behavior\n\nCHROME DEVTOOLS MCP REQUIREMENT\n\nUse Chrome DevTools MCP to inspect the real application in Chrome.\n\nUse browser evidence whenever possible:\n\n- Screenshots\n- DOM snapshots\n- Accessibility tree snapshots where useful\n- Console messages\n- Network requests\n- Viewport resizing\n- User interactions\n- Runtime observations\n- Performance traces where\
    \ needed\n\nDo not rely only on static code inspection.\n\nROUTE REGRESSION COVERAGE\n\nRe-test:\n\n- Critical routes\n- Primary user journey routes\n- Routes changed by consolidated fixes\n- Routes with previous visual issues\n- Routes with previous performance issues\n- Routes with previous accessibility issues\n- Forms\n- Data-heavy screens\n- Dashboard screens\n- Dialog/drawer/menu screens\n\nFor each tested route:\n\n- Verify it loads.\n- Verify no critical console errors exist.\n- Verify no critical network failures exist.\n- Verify primary content appears.\n- Verify primary actions are usable.\n- Verify no obvious visual regressions exist.\n- Verify no obvious accessibility regressions exist.\n- Verify no obvious performance regressions exist.\n\nRESPONSIVE REGRESSION QA\n\nRe-test important routes across:\n\n- Desktop viewport\n- Tablet viewport\n- Mobile viewport\n\nFor each viewport verify:\n\n- No horizontal overflow\n- No clipped critical content\n- No overlapping components\n\
    - Navigation remains usable\n- Primary actions remain visible or reachable\n- Text remains readable\n- Touch target intent remains reasonable\n- Information hierarchy is preserved\n\nVISUAL FIDELITY REGRESSION QA\n\nVerify that the post-fix implementation still preserves:\n\n- final_visual_design_blueprint\n- selected visual direction\n- visual hierarchy\n- screen composition\n- layout principles\n- typography direction\n- color direction\n- component system direction\n- product personality\n- premium visual quality\n\nThe UI must not regress into generic SaaS/dashboard design.\n\nREACT REGRESSION QA\n\nRe-check changed components and areas related to previous React Doctor\nfindings.\n\nVerify:\n\n- No new unnecessary broad state ownership\n- No new excessive prop drilling\n- No new unstable props where avoidable\n- No new unnecessary effects\n- No new obvious render loops\n- No new excessive abstraction\n- No new unnecessary memoization\n- Component responsibilities remain clear\n\n\
    Do not claim runtime rerender confirmation unless supported by browser,\nprofiling or clear code evidence.\n\nPERFORMANCE REGRESSION QA\n\nRe-check performance-sensitive areas:\n\n- Routes changed by fixes\n- Data-heavy screens\n- Dashboard screens\n- Forms with dynamic behavior\n- Lists/tables/charts\n- Interactions flagged by previous performance QA\n- Mobile viewport behavior\n\nVerify:\n\n- No obvious interaction slowdown\n- No severe main-thread blocking symptoms\n- No new layout instability\n- No new large asset/network issue\n- No performance fix degraded visual quality or accessibility\n\nUse performance traces only where needed to validate important or\nsuspicious regressions.\n\nACCESSIBILITY REGRESSION QA\n\nRe-check accessibility-sensitive areas:\n\n- Keyboard navigation\n- Focus visibility\n- Focus order\n- Forms\n- Dialogs/drawers/menus\n- Buttons/links/inputs\n- Landmark structure\n- Heading structure\n- Accessible names\n- Error/loading/empty states\n- Responsive accessibility\n\
    \nVerify:\n\n- Accessibility fixes improved or preserved accessibility.\n- Visual fixes did not create accessibility regressions.\n- Performance fixes did not create accessibility regressions.\n- Keyboard-only use remains possible for critical journeys.\n\nDESIGN / ACCESSIBILITY / PERFORMANCE BALANCE\n\nEvaluate whether the final implementation keeps a healthy balance between:\n\n- Visual ambition\n- UX clarity\n- Accessibility\n- Performance\n- Maintainability\n\nDo not require lowering design quality unless there is a verified blocker.\n\nARTIFACT CAPTURE REQUIREMENTS\n\nFor every important tested route and viewport:\n\n- Record tested URL.\n- Record tested viewport.\n- Capture screenshot evidence where useful.\n- Capture browser/DOM snapshot where useful.\n- Capture accessibility tree snapshot where useful.\n- Record console/network observations.\n- Record whether the route was fully testable.\n\nUse stable artifact naming:\n\n- final-regression-qa/<route-slug>/<viewport-name>-screenshot\n\
    - final-regression-qa/<route-slug>/<viewport-name>-snapshot\n- final-regression-qa/<route-slug>/<viewport-name>-a11y-snapshot\n- final-regression-qa/<route-slug>/<viewport-name>-runtime-notes\n\nEVIDENCE LEVEL RULE\n\nFor every final finding classify evidence_level as:\n\n- confirmed_regression\n- likely_regression_risk\n- unresolved_existing_issue\n- resolved_issue_verified\n- requires_follow_up_validation\n\nDo not claim a regression is confirmed unless observed through validation,\nbrowser evidence, automated test output or clear code evidence.\n\nRELEASE BLOCKER RULE\n\nMark final_workflow_status as blocked if any of the following are true:\n\n- Build fails.\n- App cannot load.\n- Primary route crashes.\n- Primary user journey is unusable.\n- Keyboard navigation blocks a critical journey.\n- Critical accessibility issue remains unresolved.\n- Critical visual regression breaks usability.\n- Critical performance issue makes the app unusable.\n- Fix implementation introduced untraceable\
    \ high-risk changes.\n\nRELEASE READINESS SCORING\n\nScore each dimension from 1 to 10:\n\n- build_health\n- test_health\n- visual_regression_safety\n- ux_regression_safety\n- responsive_regression_safety\n- react_architecture_safety\n- performance_regression_safety\n- accessibility_regression_safety\n- design_fidelity_preservation\n- release_confidence\n\nRELEASE DECISION LOGIC\n\nSet final_workflow_status to one of:\n\n- ready_for_human_review\n- ready_with_known_limitations\n- requires_additional_fix_iteration\n- blocked\n\nUse:\n\n- ready_for_human_review if all critical validations pass, no blocking\n  regressions are found, and release_confidence is high.\n- ready_with_known_limitations if non-blocking issues remain but they are\n  clearly documented and acceptable for human review.\n- requires_additional_fix_iteration if important fixable regressions remain.\n- blocked if build, runtime, primary journeys, accessibility, routing or\n  critical usability are broken.\n\nITERATION\
    \ ROUTING\n\nIf final_workflow_status is requires_additional_fix_iteration or blocked,\nrecommend the next node to resume from:\n\n- consolidated-qa-fix-plan\n- consolidated-fix-implementation\n- frontend-implementation\n- human-review-required\n\nInclude the reason for the routing decision.\n\nFINAL HUMAN HANDOFF\n\nProduce a concise human-readable handoff containing:\n\n- What was redesigned.\n- What was implemented.\n- What was fixed.\n- What passed validation.\n- What still needs human review.\n- What limitations remain.\n- Whether the frontend is ready to manually inspect.\n\nFINAL OUTPUT\n\nMust include:\n\n- final_regression_qa_summary\n- final_workflow_status\n- validation_commands_discovered\n- validation_commands_run\n- validation_results\n- static_validation_status\n- tested_routes\n- tested_viewports\n- tested_user_journeys\n- regression_artifacts\n- fix_plan_compliance_check\n- canonical_issue_resolution_matrix\n- resolved_issues_verified\n- partially_resolved_issues\n-\
    \ unresolved_issues\n- new_regressions_detected\n- likely_regression_risks\n- visual_regression_findings\n- responsive_regression_findings\n- react_regression_findings\n- performance_regression_findings\n- accessibility_regression_findings\n- console_network_regression_findings\n- design_fidelity_final_assessment\n- accessibility_final_assessment\n- performance_final_assessment\n- release_readiness_scorecard\n- evidence_level_by_finding\n- remaining_known_limitations\n- recommended_next_actions\n- recommended_resume_node\n- iteration_reasoning\n- human_review_notes\n- final_human_handoff\n- final_frontend_quality_summary\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n\n- old_frontend_was_used_as_reference\n- old_frontend_behavior_used_as_baseline\n- old_frontend_patterns_reused\n- current_frontend_validated_only_as_new_implementation\n- confidence_of_isolation\n\nProduce a structured artifact named:\n\nfinal_regression_qa_report\n\n\nFINAL PREMIUM REGRESSION RULE\n\nThe\
    \ run is not release-ready if the final browser screenshots look basic, generic, default-styled, or noticeably less premium than the approved design-token contract.\n"
  output_format:
    type: object
    properties:
      summary:
        type: string
