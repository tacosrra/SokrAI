- id: accessibility-qa
  name: Accessibility QA
  depends_on:
  - premium-visual-polish-implementation
  always_run: true
  mcp: .archon/mcp/chrome-devtools.json
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "PARALLEL QA RULE\n\nThis node is part of the read-only parallel technical QA group. Do not modify files. Do not wait for React Doctor or performance QA outputs. Use Chrome DevTools MCP and the implemented app. Limit repository inspection to accessibility-relevant files only.\n\n      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      frontend_implementation_report:\n      $frontend-implementation.output\n\n      frontend_implementation_plan:\n      $frontend-implementation-plan.output\n\n      final_visual_design_blueprint:\n      $visual-design-token-contract.output\n\n      ux_strategy_blueprint:\n      $ux-strategy.output\n\n            You are the accessibility QA phase of a backend-first frontend design\nworkflow.\n\nYour mission is to evaluate the newly implemented frontend in a real\nChrome browser using Chrome DevTools MCP, with accessibility judged\nagainst\
    \ WCAG 2.2 A/AA principles where applicable.\n\nThis node performs accessibility, keyboard navigation, focus management,\nsemantic structure, ARIA, form accessibility, contrast intent and\nassistive-technology-oriented QA.\n\nIMPORTANT RULES\n\n- Do not modify files in this node.\n- Do not implement fixes.\n- Do not redesign the product.\n- Do not reinterpret the approved visual direction.\n- Do not inspect old frontend code.\n- Do not use old frontend behavior as a reference.\n- Your responsibility is accessibility measurement, diagnosis and issue\n  reporting only.\n\nINPUTS\n\nUse:\n\n- frontend_implementation_report\n- frontend_implementation_plan\n- final_visual_design_blueprint\n- ux_strategy_blueprint\n- current running frontend application\n\nCHROME DEVTOOLS MCP REQUIREMENT\n\nUse Chrome DevTools MCP to inspect the real application in Chrome.\n\nUse browser evidence whenever possible:\n\n- Accessibility tree snapshots\n- DOM snapshots\n- Keyboard navigation observations\n- Focus\
    \ behavior observations\n- Console/runtime accessibility-related warnings where available\n- Screenshots only when useful to document visible accessibility issues\n- Runtime observations from real user interactions\n\nDo not rely only on static code inspection.\n\nSCOPE BOUNDARY\n\nThis node is responsible for accessibility QA.\n\nFocus on:\n\n- Keyboard navigation\n- Focus visibility\n- Focus order\n- Semantic HTML\n- ARIA usage\n- Accessible names\n- Form labels and descriptions\n- Error messaging\n- Button/link semantics\n- Dialog/drawer/menu accessibility\n- Table/list/chart accessibility\n- Landmark structure\n- Heading structure\n- Contrast intent\n- Touch target usability\n- Responsive accessibility\n- Loading, empty, error and permission state accessibility\n\nDo not perform general visual QA here.\nDo not perform performance trace QA here.\nDo not implement accessibility fixes here.\n\nACCESSIBILITY STANDARD\n\nUse WCAG 2.2 A/AA as the default evaluation target unless the project\n\
    defines a different accessibility target.\n\nOrganize findings where possible under:\n\n- Perceivable\n- Operable\n- Understandable\n- Robust\n\nWCAG TRACEABILITY RULE\n\nFor every accessibility issue, classify it as:\n\n- wcag_failure\n- likely_wcag_risk\n- accessibility_ux_concern\n- best_practice_issue\n- requires_specialized_testing\n\nDo not label an issue as wcag_failure unless a specific WCAG 2.2\nsuccess criterion can be reasonably identified.\n\nIf a finding is based on best practice rather than a clear WCAG issue,\nmark it as best_practice_issue.\n\nASSISTIVE TECHNOLOGY LIMITATION\n\nDo not claim that the product is screen-reader validated unless real\nscreen reader testing was performed.\n\nIf only accessibility tree snapshots were inspected, state that findings\nare browser accessibility tree observations, not full assistive technology\nvalidation.\n\nAUTOMATED ACCESSIBILITY TOOLING DISCOVERY\n\nBefore finalizing the report, identify whether the project already has\nsafe\
    \ accessibility validation commands available, such as:\n\n- axe\n- jest-axe\n- playwright accessibility checks\n- lighthouse accessibility\n- eslint-jsx-a11y\n- existing accessibility test scripts\n\nRun them only if they are already configured and safe to execute.\n\nTreat automated results as supporting evidence, not as complete proof of\naccessibility.\n\nSERVER / APP AVAILABILITY CHECK\n\nBefore accessibility QA:\n\n- Determine the local application URL.\n- Start or reuse the application server if required.\n- Verify that the app loads in Chrome.\n- If the app cannot load, mark this node as blocked and document why.\n- Do not attempt broad fixes in this node.\n\nROUTE AND SCREEN COVERAGE\n\nInspect every implemented screen listed in frontend_implementation_report,\nprioritizing:\n\n- Primary user journey screens\n- Screens with forms\n- Screens with dialogs, menus, drawers or popovers\n- Screens with tables, lists, charts or dense data\n- Screens flagged by chrome_visual_qa_report\n\
    - Screens flagged by browser_performance_qa_report\n\nFor each important screen:\n\n- Navigate to the route.\n- Wait for the page to finish loading.\n- Capture accessibility tree snapshot evidence where useful.\n- Check heading structure.\n- Check landmark structure.\n- Check accessible names.\n- Check keyboard navigation.\n- Check focus visibility.\n- Check focus order.\n- Check form labels.\n- Check error messaging.\n- Check semantic structure.\n- Check state announcements where observable.\n- Check whether the route is fully testable.\n\nKEYBOARD QA\n\nFor each primary screen and journey:\n\n- Navigate using keyboard only.\n- Verify all interactive elements are reachable.\n- Verify focus order is logical.\n- Verify focus is visible.\n- Verify focus is not trapped except inside modal/dialog contexts.\n- Verify skip/landmark navigation where applicable.\n- Verify escape/close behavior for dialogs, drawers, menus and popovers.\n- Verify no keyboard dead ends exist.\n\nINTERACTIVE COMPONENT\
    \ QA\n\nEvaluate:\n\n- Buttons\n- Links\n- Inputs\n- Selects\n- Comboboxes\n- Checkboxes\n- Radios\n- Toggles\n- Tabs\n- Menus\n- Dialogs\n- Drawers\n- Tooltips\n- Tables\n- Charts\n- Cards with actions\n- Search/filter controls\n\nFor each relevant component type check:\n\n- Correct semantic role\n- Accessible name\n- Keyboard interaction\n- Focus behavior\n- Disabled state behavior\n- Error state behavior\n- Loading state behavior\n- ARIA only when needed and used correctly\n\nFORM ACCESSIBILITY QA\n\nFor forms:\n\n- Every input has a programmatically associated label.\n- Help text is associated where needed.\n- Validation errors are clear and associated with fields.\n- Required fields are communicated accessibly.\n- Error summaries exist where appropriate.\n- Keyboard-only completion is possible.\n- Focus moves predictably after submit or validation failure.\n- Placeholder text is not the only label.\n\nSEMANTIC STRUCTURE QA\n\nCheck:\n\n- Heading order is logical.\n- Landmarks are\
    \ meaningful.\n- Navigation regions are identifiable.\n- Main content is identifiable.\n- Lists are represented as lists where appropriate.\n- Tables use correct table semantics when applicable.\n- Clickable div/span patterns are avoided.\n- Icons with meaning have accessible names.\n- Decorative icons are hidden from assistive technologies.\n\nARIA QA\n\nCheck:\n\n- ARIA is not used where native HTML is sufficient.\n- ARIA roles match component behavior.\n- aria-label/aria-labelledby/aria-describedby are used correctly.\n- aria-expanded, aria-selected, aria-current and aria-invalid are accurate.\n- Hidden content is not exposed incorrectly.\n- Visible content is not accidentally hidden from assistive technologies.\n\nSTATES ACCESSIBILITY QA\n\nCheck accessibility of:\n\n- Loading states\n- Empty states\n- Error states\n- Permission states\n- Disabled states\n- Success states\n- Toasts/notifications\n- Inline validation\n- Background updates where applicable\n\nRESPONSIVE ACCESSIBILITY\
    \ QA\n\nTest important screens across:\n\n- Desktop viewport\n- Tablet viewport\n- Mobile viewport\n\nFor each viewport evaluate:\n\n- Keyboard/touch usability\n- Focus visibility\n- Reading order\n- Touch target intent\n- Hidden content behavior\n- Navigation accessibility\n- Modal/drawer/menu accessibility\n\nCONTRAST AND VISUAL ACCESSIBILITY\n\nEvaluate visible contrast concerns where observable.\n\nCheck:\n\n- Text contrast intent\n- Interactive control contrast\n- Focus indicator contrast\n- Disabled state clarity\n- Error/success/warning state distinguishability\n- Reliance on color alone\n\nIf exact contrast tooling is unavailable, mark contrast findings as\nlikely_contrast_risk and recommend automated contrast validation.\n\nACCESSIBILITY IMPACT CLASSIFICATION\n\nFor every issue classify impact as:\n\n- blocks_core_journey\n- blocks_keyboard_usage\n- blocks_form_completion\n- causes_screen_reader_confusion\n- reduces_clarity\n- reduces_efficiency\n- minor_best_practice_gap\n\n\
    DESIGN FIDELITY PROTECTION\n\nAny recommended accessibility fix must preserve:\n\n- final_visual_design_blueprint\n- selected visual direction\n- visual hierarchy\n- interaction strategy\n- responsive behavior\n- product personality\n\nDo not recommend accessibility changes that unnecessarily degrade the\nintended premium visual experience.\n\nPrefer accessible refinements that preserve design quality.\n\nISSUE CLASSIFICATION\n\nFor every issue include:\n\n- Issue title\n- Screen or route\n- Viewport\n- WCAG principle if applicable\n- WCAG criterion if identifiable\n- WCAG traceability classification\n- Accessibility impact classification\n- Category\n- Severity\n- Evidence source\n- Accessibility tree evidence if available\n- DOM/snapshot evidence if available\n- Keyboard evidence if available\n- Automated tooling evidence if available\n- Why it matters\n- User impact\n- Recommended correction\n- Whether it blocks release\n- Whether it should be fixed in consolidated fixes\n\nEVIDENCE\
    \ LEVEL RULE\n\nClassify each issue as:\n\n- confirmed_accessibility_issue\n- likely_accessibility_risk\n- best_practice_issue\n- requires_specialized_testing\n\nDo not report accessibility issues as confirmed unless observed in Chrome,\naccessibility tree evidence, DOM evidence, keyboard testing, automated\ntooling evidence or clear code evidence.\n\nSPECIALIZED TESTING LIMITATION\n\nClearly mark issues that require specialized testing beyond this node,\nsuch as:\n\n- Screen reader-specific behavior\n- Exact contrast ratio measurement if unavailable\n- Real assistive technology testing\n- User testing with disabled users\n- Complex ARIA widget conformance\n\nARTIFACT CAPTURE REQUIREMENTS\n\nFor every tested route and viewport:\n\n- Record the tested URL.\n- Record the tested viewport.\n- Capture accessibility tree snapshot evidence where useful.\n- Capture DOM/browser snapshot evidence where useful.\n- Record keyboard navigation observations.\n- Record whether the route was fully testable.\n\
    \nUse stable artifact naming:\n\n- accessibility-qa/<route-slug>/<viewport-name>-a11y-snapshot\n- accessibility-qa/<route-slug>/<viewport-name>-keyboard-notes\n- accessibility-qa/<route-slug>/<viewport-name>-semantic-notes\n\nACCESSIBILITY SCORECARD\n\nScore each dimension from 1 to 10:\n\n- keyboard_navigation\n- focus_management\n- semantic_structure\n- accessible_names\n- form_accessibility\n- aria_correctness\n- state_accessibility\n- responsive_accessibility\n- visual_accessibility\n- accessibility_design_fidelity_balance\n\nAPPROVAL LOGIC\n\nSet accessibility_qa_status to one of:\n\n- approved_for_consolidated_synthesis\n- accessibility_issues_found_continue\n- blocked\n\nUse:\n\n- approved_for_consolidated_synthesis if no blocking accessibility issues\n  are found and all critical scores are >= 8.\n- accessibility_issues_found_continue if accessibility issues exist but\n  they can be handled in consolidated fixes.\n- blocked if keyboard navigation, focus management, forms, navigation\
    \ or\n  critical user journeys are inaccessible enough to make the product\n  unusable.\n\nFINAL OUTPUT\n\nMust include:\n\n- accessibility_qa_summary\n- accessibility_qa_status\n- accessibility_standard_used\n- tested_routes\n- tested_viewports\n- tested_user_journeys\n- accessibility_snapshot_artifacts\n- automated_accessibility_tooling_results\n- keyboard_navigation_findings\n- focus_management_findings\n- semantic_structure_findings\n- aria_findings\n- form_accessibility_findings\n- state_accessibility_findings\n- responsive_accessibility_findings\n- contrast_and_visual_accessibility_findings\n- confirmed_accessibility_issues\n- likely_accessibility_risks\n- best_practice_issues\n- issues_requiring_specialized_testing\n- wcag_traceability_matrix\n- accessibility_impact_by_issue\n- evidence_level_by_issue\n- accessibility_scorecard\n- route_accessibility_matrix\n- viewport_accessibility_matrix\n- recommended_accessibility_fixes\n- accessibility_blockers\n- assistive_technology_limitations\n\
    - qa_limitations\n- readiness_for_consolidated_synthesis\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n\n- old_frontend_was_used_as_reference\n- old_frontend_behavior_used_as_baseline\n- old_frontend_patterns_reused\n- current_frontend_audited_only_as_new_implementation\n- confidence_of_isolation\n\nProduce a structured artifact named:\n\naccessibility_qa_report\n"
