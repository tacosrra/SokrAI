services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ${SOKRAI_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://sokrai_app:localpass@postgres:5432/sokrai_app
      OLLAMA_BASE_URL: http://ollama:11434
      APP_PORT: 3001
    ports:
      - "127.0.0.1:${API_HOST_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - ${SOKRAI_ENV_FILE:-.env}
    environment:
      FRONTEND_PORT: 3000
      API_PROXY_TARGET: http://api:3001
      WEBHOOK_PROXY_TARGET: http://n8n:5678
      VITE_API_BASE_URL: ""
      VITE_WEBHOOK_BASE_URL: ""
      VITE_START_SESSION_TIMEOUT_MS: ${VITE_START_SESSION_TIMEOUT_MS:-1200000}
      VITE_REPLY_SESSION_TIMEOUT_MS: ${VITE_REPLY_SESSION_TIMEOUT_MS:-960000}
      VITE_SESSION_AUDIT_TIMEOUT_MS: ${VITE_SESSION_AUDIT_TIMEOUT_MS:-10000}
      VITE_REQUEST_STATUS_TIMEOUT_MS: ${VITE_REQUEST_STATUS_TIMEOUT_MS:-10000}
      VITE_REQUEST_RECOVERY_TIMEOUT_MS: ${VITE_REQUEST_RECOVERY_TIMEOUT_MS:-1200000}
      VITE_ACTIVE_RECOVERY_AFTER_MS: ${VITE_ACTIVE_RECOVERY_AFTER_MS:-60000}
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started
      n8n:
        condition: service_started

  n8n:
    image: n8nio/n8n:latest
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: sokrai_n8n
      DB_POSTGRESDB_USER: sokrai_n8n
      DB_POSTGRESDB_PASSWORD: localpass
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin}
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_EDITOR_BASE_URL: http://localhost:${N8N_HOST_PORT:-5678}
      WEBHOOK_URL: http://localhost:${N8N_HOST_PORT:-5678}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-a-random-32-char-secret}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-replace-with-a-random-32-char-secret}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: ${EXECUTIONS_DATA_SAVE_ON_SUCCESS:-none}
      EXECUTIONS_DATA_SAVE_ON_ERROR: ${EXECUTIONS_DATA_SAVE_ON_ERROR:-none}
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: ${EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS:-false}
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: ${EXECUTIONS_DATA_SAVE_ON_PROGRESS:-false}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-24}
    ports:
      - "127.0.0.1:${N8N_HOST_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./infra/n8n/workflows:/workflows
    depends_on:
      postgres:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ./ollama_data:/root/.ollama

volumes:
  n8n_data:
