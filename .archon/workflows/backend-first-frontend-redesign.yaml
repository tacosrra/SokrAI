    CONSOLIDATION OBJECTIVE

    Build a single fix plan that:

    - Deduplicates repeated issues.
    - Groups related issues.
    - Resolves conflicting recommendations.
    - Prioritizes fixes by user impact and release risk.
    - Preserves the approved UX strategy.
    - Preserves the approved visual design.
    - Preserves accessibility requirements.
    - Preserves or improves performance.
    - Avoids unnecessary rewrites.
    - Avoids over-optimization.
    - Avoids generic visual degradation.
    - Gives the implementation node a precise, executable contract.

    INCOMPLETE QA HANDLING

    If any upstream QA report is missing, blocked or incomplete, do not ignore it.

    For each missing or incomplete QA source:

    - Identify what information is missing.
    - Determine whether fixing can safely proceed.
    - Mark affected fixes as lower confidence where appropriate.
    - Add follow-up validation requirements.
    - Do not claim full QA coverage if any audit was incomplete.

    QA REPORT SYNTHESIS

    Analyze findings from:

    React Doctor:

    - Component architecture issues
    - Rerender risks
    - State management issues
    - Effects issues
    - Data fetching issues
    - Optimization recommendations

    Chrome Visual QA:

    - Visual fidelity issues
    - Layout issues
    - Responsive issues
    - Interaction issues
    - Console issues
    - Network issues
    - Browser blockers

    Browser Performance QA:

    - Loading performance issues
    - Runtime performance issues
    - Interaction performance issues
    - Rendering issues
    - Layout stability issues
    - Network performance issues
    - Asset performance issues
    - Mobile performance issues

    Accessibility QA:

    - Keyboard navigation issues
    - Focus management issues
    - Semantic structure issues
    - ARIA issues
    - Form accessibility issues
    - State accessibility issues
    - Responsive accessibility issues
    - Contrast and visual accessibility issues
    - WCAG-related risks

    ISSUE DEDUPLICATION

    Merge issues that describe the same root cause.

    For every merged issue, preserve:

    - All original source reports
    - All affected routes/screens
    - All affected components
    - All evidence references
    - All impacted user journeys
    - All relevant severity signals

    Do not lose evidence when deduplicating.

    CANONICAL ISSUE ID RULE

    Assign a stable canonical ID to every deduplicated issue.

    Use the format:

    - QA-P0-001
    - QA-P1-001
    - QA-P2-001
    - QA-P3-001
    - QA-P4-001

    Every fix must reference one or more canonical issue IDs.

    ROOT CAUSE ANALYSIS

    For every consolidated issue identify:

    - Canonical issue ID
    - Root cause
    - Symptoms
    - Affected screens
    - Affected components
    - Affected user journeys
    - Related QA reports
    - Whether the issue is confirmed or only likely
    - Whether deeper validation is required

    CONFLICT RESOLUTION

    If QA reports recommend conflicting fixes, resolve the conflict using this
    priority order:

    1. Preserve critical user journeys.
    2. Fix blocking accessibility issues.
    3. Fix app crashes, broken routes and unusable flows.
    4. Preserve approved UX structure.
    5. Preserve approved visual direction.
    6. Improve measurable performance problems.
    7. Improve React architecture where beneficial.
    8. Improve polish and non-blocking visual quality.

    If a conflict cannot be resolved safely, mark it as requiring human review.

    PRIORITIZATION

    Prioritize fixes using:

    - User impact
    - Release risk
    - Severity
    - Frequency of affected journey
    - Accessibility impact
    - Performance impact
    - Visual/design fidelity impact
    - Implementation difficulty
    - Regression risk
    - Confidence of evidence

    Assign each consolidated issue a priority:

    - P0_blocker
    - P1_critical
    - P2_high
    - P3_medium
    - P4_low

    FIX GROUPING

    Group fixes into implementation batches.

    Batches should minimize rework and avoid ping-pong between concerns.

    Suggested grouping:

    - Build/runtime blockers
    - Routing/navigation blockers
    - Accessibility blockers
    - Layout/responsive fixes
    - React architecture/render fixes
    - Performance fixes
    - Data fetching/network fixes
    - Visual fidelity/polish fixes
    - Final cleanup

    FIX PLAN REQUIREMENTS

    For every planned fix include:

    - Fix title
    - Canonical issue IDs resolved
    - Priority
    - Source issues
    - Root cause
    - Target files
    - Target components
    - Target routes/screens
    - Exact change strategy
    - Expected benefit
    - Risks
    - Regression risk
    - Validation required
    - Whether safe to automate
    - Whether human review is recommended
    - Whether it should be handled before other fixes

    FIX ACCEPTANCE CRITERIA

    For every fix define precise acceptance criteria.

    Each fix must include:

    - What must change
    - What must not change
    - How success will be validated
    - Which route/screen must be checked
    - Which viewport must be checked
    - Which QA report issue it resolves
    - Which regression risks must be avoided

    DO-NOT-TOUCH LIST

    Produce a do_not_touch list for the next node.

    Include:

    - Files that should not be modified
    - UX structures that must remain unchanged
    - Visual decisions that must remain unchanged
    - API contracts that must remain unchanged
    - Backend behavior that must remain unchanged
    - Working areas that should not be rewritten

    DESIGN FIDELITY PROTECTION

    Every fix must preserve:

    - final_visual_design_blueprint
    - selected visual direction
    - visual hierarchy
    - screen composition
    - interaction strategy
    - responsive behavior
    - product personality
    - premium visual quality

    Do not recommend fixes that reduce the UI into a generic dashboard unless
    there is no safer way to resolve a blocking issue.

    ACCESSIBILITY PROTECTION

    Every fix must preserve or improve:

    - Keyboard navigation
    - Focus management
    - Semantic structure
    - Accessible names
    - Form accessibility
    - ARIA correctness
    - State accessibility
    - Responsive accessibility

    Do not recommend visual or performance fixes that create accessibility
    regressions.

    PERFORMANCE PROTECTION

    Every fix must preserve or improve:

    - Runtime responsiveness
    - Rendering efficiency
    - Interaction responsiveness
    - Network efficiency
    - Mobile performance
    - Layout stability

    Do not recommend accessibility or visual fixes that introduce severe
    performance regressions.

    REACT OPTIMIZATION GUARDRAIL

    Do not recommend unnecessary memoization or abstraction.

    Avoid:

    - React.memo without clear benefit
    - useMemo without clear benefit
    - useCallback without clear benefit
    - Premature component splitting
    - Excessive abstraction
    - Rewriting stable code without evidence

    Prefer simple, maintainable fixes unless stronger optimization is clearly
    justified by evidence.

    SAFE IMPLEMENTATION GUARDRAILS

    The next node will implement this plan.

    Therefore, make the plan safe enough to execute:

    - Avoid broad rewrites unless unavoidable.
    - Avoid touching backend code unless explicitly justified.
    - Avoid changing API contracts unless required and documented.
    - Avoid replacing working project configuration unless necessary.
    - Avoid changes that conflict with frontend_implementation_plan.
    - Avoid changes that conflict with final_visual_design_blueprint.

    If a fix requires risky architectural change, mark it as requiring human
    review before implementation.

    NODE 14 HANDOFF CONTRACT

    The output must be directly executable by the consolidated fix
    implementation node.

    For each fix batch include:

    - Ordered steps
    - Target files
    - Allowed changes
    - Forbidden changes
    - Validation commands
    - Expected output after validation
    - Rollback notes if the fix fails

    VALIDATION PLAN

    For every fix batch define required validation:

    - lint
    - typecheck
    - build
    - tests
    - React Doctor re-check
    - Chrome visual re-check
    - Browser performance re-check
    - Accessibility re-check
    - Route-specific validation
    - Viewport-specific validation
    - User journey validation

    REGRESSION PLAN

    Define what must be re-tested after fixes:

    - Critical routes
    - Primary journeys
    - Screens changed by fixes
    - Components changed by fixes
    - Mobile viewport behavior
    - Keyboard flows
    - Performance-sensitive screens
    - Data-heavy screens
    - Forms
    - Dialogs/drawers/menus

    HUMAN REVIEW ESCALATION

    Mark issues for human review when:

    - Fixes require product trade-offs.
    - Fixes require visual direction changes.
    - Fixes require UX structure changes.
    - Fixes require backend/API changes.
    - QA evidence is conflicting.
    - Fix could materially reduce design quality.
    - Fix could materially affect accessibility or performance.

    APPROVAL LOGIC

    Set consolidated_fix_plan_status to one of:

    - ready_for_fix_implementation
    - requires_human_review
    - blocked

    Use:

    - ready_for_fix_implementation if all fixes are clear, safe and
      implementation-ready.
    - requires_human_review if some fixes involve meaningful trade-offs or
      uncertain evidence.
    - blocked if the app cannot be safely fixed without major product,
      backend, UX or design decisions.

