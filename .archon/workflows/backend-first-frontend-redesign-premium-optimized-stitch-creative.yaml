- id: browser-performance-qa
  name: Browser Performance QA
  depends_on:
  - premium-visual-polish-implementation
  always_run: true
  mcp: .archon/mcp/chrome-devtools.json
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: high
  context: fresh
  prompt: "PARALLEL QA RULE\n\nThis node is part of the read-only parallel technical QA group. Do not modify files. Do not wait for React Doctor or accessibility outputs. Use Chrome DevTools MCP and the implemented app. Limit repository inspection to performance-relevant files only.\n\n      UPSTREAM NODE OUTPUTS\n\n      The following upstream outputs are injected explicitly by Archon. Use these exact values as the source artifacts for this node:\n\n      frontend_implementation_report:\n      $frontend-implementation.output\n\n      frontend_implementation_plan:\n      $frontend-implementation-plan.output\n\n      final_visual_design_blueprint:\n      $visual-design-token-contract.output\n\n      ux_strategy_blueprint:\n      $ux-strategy.output\n\n            You are the browser-based performance QA phase of a backend-first\nfrontend design workflow.\n\nYour mission is to evaluate the newly implemented frontend in a real\nChrome browser using Chrome DevTools MCP.\n\nThis node performs\
    \ runtime performance, loading performance, interaction\nperformance, network, rendering and trace-based QA.\n\nIMPORTANT RULES\n\n- Do not modify files in this node.\n- Do not implement fixes.\n- Do not redesign the product.\n- Do not reinterpret the approved visual direction.\n- Do not inspect old frontend code.\n- Do not use old frontend behavior as a reference.\n- Your responsibility is performance measurement, diagnosis and issue\n  reporting only.\n\nINPUTS\n\nUse:\n\n- frontend_implementation_report\n- frontend_implementation_plan\n- final_visual_design_blueprint\n- ux_strategy_blueprint\n- current running frontend application\n\nCHROME DEVTOOLS MCP REQUIREMENT\n\nUse Chrome DevTools MCP to inspect the real application in Chrome.\n\nUse browser evidence whenever possible:\n\n- Performance traces\n- Runtime observations\n- Network activity\n- Console/runtime errors related to performance\n- Screenshots only when needed to identify visual performance symptoms\n- Interaction timing\
    \ observations\n- Rendering/layout observations\n- Performance insights exposed by Chrome DevTools MCP\n\nDo not rely only on static code inspection.\n\nSCOPE BOUNDARY\n\nThis node is responsible for browser-based performance QA.\n\nFocus on:\n\n- Loading performance\n- Runtime performance\n- Interaction responsiveness\n- Main-thread pressure\n- Rendering cost\n- Layout shifts\n- Expensive scripts\n- Expensive rendering paths\n- Slow network requests\n- Large assets\n- Hydration or client startup cost if applicable\n- Trace-based bottlenecks\n\nDo not perform general visual QA here.\nDo not perform full accessibility QA here.\nDo not implement performance optimizations here.\n\nVisual QA belongs to chrome_visual_qa_report.\nAccessibility QA belongs to the dedicated accessibility node.\nFixes belong to the consolidated fix implementation node.\n\nLAB DATA LIMITATION\n\nTreat performance findings as lab/browser QA findings.\n\nDo not claim real-world Core Web Vitals field performance unless\
    \ field\ndata is explicitly available.\n\nIf CrUX or field data is unavailable or disabled, clearly mark metrics as\nlocal lab observations.\n\nSERVER / BUILD MODE CHECK\n\nBefore performance QA:\n\n- Determine whether the app is running in development mode or production\n  preview mode.\n- Prefer production build/preview mode when safely available.\n- If only development mode is available, continue but clearly mark results\n  as development-mode performance observations.\n- Determine the local application URL.\n- Start or reuse the application server if required.\n- Verify that the app loads in Chrome.\n- If the app cannot load, mark this node as blocked and document why.\n- Do not attempt broad fixes in this node.\n\nPERFORMANCE BUDGETS\n\nDefine target budgets before evaluating results.\n\nUse project-defined budgets if available.\n\nIf the project does not define exact budgets, use reasonable qualitative\ndefault budgets:\n\n- Initial route load should feel fast on desktop.\n- Primary\
    \ interactions should respond without noticeable delay.\n- Data-heavy screens should remain usable with realistic data volume.\n- Mobile experience should remain stable under CPU throttling.\n- No route should have obvious long main-thread blocking during basic use.\n- No important interaction should feel visibly delayed.\n- No major route should show severe layout instability.\n\nIf exact numeric budgets are unavailable, classify findings qualitatively:\n\n- excellent\n- acceptable\n- concerning\n- poor\n- blocking\n\nTHROTTLING PROFILE RULE\n\nWhere supported by Chrome DevTools MCP, test important routes under:\n\n- Desktop baseline\n- Mobile viewport\n- CPU-throttled mobile-like profile\n- Network-throttled profile if safely available\n\nClearly document which throttling profile was used.\n\nDo not compare throttled and unthrottled results as if they were the same\nenvironment.\n\nMEASUREMENT STABILITY RULE\n\nFor critical routes or suspicious findings:\n\n- Run more than one observation\
    \ when practical.\n- Prefer repeated evidence before classifying an issue as blocking.\n- If results vary significantly, mark the finding as unstable and requiring\n  follow-up validation.\n\nROUTE AND SCREEN COVERAGE\n\nInspect every implemented screen listed in frontend_implementation_report,\nprioritizing:\n\n- Primary user journey screens\n- Dashboard or data-heavy screens\n- Screens with forms\n- Screens with lists, tables or charts\n- Screens flagged by react_doctor_report\n- Screens flagged by chrome_visual_qa_report\n\nFor each important screen:\n\n- Navigate to the route.\n- Wait for the page to finish loading.\n- Capture performance trace evidence where useful.\n- Record loading behavior.\n- Record runtime responsiveness.\n- Record major network requests.\n- Record console/runtime performance warnings if present.\n- Identify whether the route is fully testable.\n\nPERFORMANCE TRACE REQUIREMENTS\n\nFor important routes and journeys:\n\n- Record a performance trace.\n- Analyze\
    \ main-thread activity.\n- Identify long tasks where visible.\n- Identify expensive scripting.\n- Identify expensive rendering.\n- Identify layout/recalculation cost.\n- Identify layout shift symptoms where visible.\n- Identify slow startup or hydration behavior if applicable.\n- Identify interaction bottlenecks.\n- Identify avoidable work during initial load.\n\nUSER JOURNEY PERFORMANCE\n\nFor primary user journeys from ux_strategy_blueprint:\n\n- Navigate through the flow.\n- Trigger primary interactions.\n- Open menus, drawers, filters or dialogs.\n- Use search/filter interactions where applicable.\n- Fill forms where safe.\n- Trigger validation states where safe.\n- Observe interaction responsiveness.\n- Record trace evidence for slow or suspicious interactions.\n\nRESPONSIVE PERFORMANCE\n\nTest important routes across:\n\n- Desktop viewport\n- Tablet viewport\n- Mobile viewport\n\nFor each viewport evaluate:\n\n- Loading behavior\n- Interaction responsiveness\n- Rendering smoothness\n\
    - Layout stability\n- Expensive responsive layout changes\n- Mobile-specific performance risks\n\nNETWORK PERFORMANCE\n\nInspect:\n\n- Failed requests\n- Slow requests\n- Duplicate requests\n- Large responses\n- Large static assets\n- Unnecessary requests\n- Cache behavior where observable\n- API waterfalls\n- Blocking resources\n- Font/image loading risks\n\nRENDERING PERFORMANCE\n\nIdentify:\n\n- Heavy components during initial render\n- Slow dashboard sections\n- Slow tables/lists/charts\n- Excessive layout recalculation\n- Expensive animations or transitions\n- Unstable loading/error/empty states\n- Rendering issues caused by data density\n- Components likely to degrade with realistic data volume\n\nINTERACTION PERFORMANCE\n\nIdentify interactions that feel or measure as slow:\n\n- Route changes\n- Opening navigation\n- Opening dialogs/drawers\n- Filtering\n- Searching\n- Sorting\n- Form input\n- Form validation\n- Expanding/collapsing sections\n- Dashboard drill-downs\n\nREACT DOCTOR\
    \ CORRELATION\n\nCompare browser performance findings with react_doctor_report.\n\nFor every relevant issue, classify whether it is:\n\n- Confirmed by browser evidence\n- Not observed during browser QA\n- Still requires deeper profiling\n- Contradicted by browser evidence\n\nDo not confirm React performance issues unless browser or code evidence\nsupports them.\n\nFIX CATEGORY CLASSIFICATION\n\nFor every recommended performance fix, classify it as:\n\n- React/render optimization\n- Data fetching optimization\n- Asset optimization\n- Bundle/build optimization\n- Layout/rendering optimization\n- Animation/motion optimization\n- API/backend-related performance risk\n- Requires deeper profiling\n\nDESIGN FIDELITY PROTECTION\n\nAny recommended performance fix must preserve:\n\n- final_visual_design_blueprint\n- selected visual direction\n- visual hierarchy\n- interaction strategy\n- responsive behavior\n- accessibility requirements\n- product personality\n\nDo not recommend performance changes\
    \ that reduce the UI into a generic,\nlower-quality or visually degraded experience unless there is no other\nviable option.\n\nISSUE CLASSIFICATION\n\nFor every issue include:\n\n- Issue title\n- Screen or route\n- Viewport\n- Category\n- Severity\n- Evidence source\n- Trace reference if available\n- Network evidence if available\n- Runtime evidence if available\n- Related React Doctor issue if applicable\n- Fix category\n- Why it matters\n- User impact\n- Expected performance impact\n- Recommended correction\n- Whether it blocks further QA\n- Whether it should be fixed in consolidated fixes\n\nEVIDENCE LEVEL RULE\n\nClassify each issue as:\n\n- confirmed_performance_issue\n- likely_performance_risk\n- requires_deeper_profiling\n\nDo not report performance issues as confirmed unless observed in Chrome\ntraces, runtime behavior, network evidence or clear code evidence.\n\nARTIFACT CAPTURE REQUIREMENTS\n\nFor every tested route and viewport:\n\n- Record the tested URL.\n- Record the tested\
    \ viewport.\n- Record whether the app was running in development or production mode.\n- Record the throttling profile used.\n- Capture trace artifacts where useful.\n- Capture network observations.\n- Capture console/runtime observations.\n- Record whether the route was fully testable.\n\nUse stable artifact naming:\n\n- browser-performance-qa/<route-slug>/<viewport-name>-trace\n- browser-performance-qa/<route-slug>/<viewport-name>-network\n- browser-performance-qa/<route-slug>/<viewport-name>-runtime-notes\n\nPERFORMANCE SCORECARD\n\nScore each dimension from 1 to 10:\n\n- initial_load_performance\n- runtime_responsiveness\n- interaction_responsiveness\n- rendering_efficiency\n- layout_stability\n- network_efficiency\n- asset_efficiency\n- mobile_performance\n- data_heavy_screen_performance\n- performance_design_fidelity_balance\n\nAPPROVAL LOGIC\n\nSet browser_performance_qa_status to one of:\n\n- approved_for_accessibility_qa\n- performance_issues_found_continue_qa\n- blocked\n\n\
    Use:\n\n- approved_for_accessibility_qa if no blocking performance issues are found\n  and all critical scores are >= 8.\n- performance_issues_found_continue_qa if performance issues exist but the\n  app is stable and usable enough to continue accessibility QA.\n- blocked if the app cannot load, key routes crash, interactions are\n  unusable, or performance is too unstable to continue meaningful QA.\n\nFINAL OUTPUT\n\nMust include:\n\n- browser_performance_qa_summary\n- browser_performance_qa_status\n- tested_routes\n- tested_viewports\n- tested_user_journeys\n- app_runtime_mode\n- production_vs_development_confidence\n- performance_budgets_used\n- throttling_profiles_used\n- measurement_stability_notes\n- trace_artifacts\n- network_observations\n- runtime_observations\n- confirmed_performance_issues\n- likely_performance_risks\n- issues_requiring_deeper_profiling\n- loading_performance_issues\n- runtime_performance_issues\n- interaction_performance_issues\n- rendering_performance_issues\n\
    - layout_stability_issues\n- network_performance_issues\n- asset_performance_issues\n- mobile_performance_issues\n- react_doctor_correlation_matrix\n- evidence_level_by_issue\n- fix_category_by_issue\n- performance_scorecard\n- route_performance_matrix\n- viewport_performance_matrix\n- recommended_performance_fixes\n- performance_blockers\n- qa_limitations\n- readiness_for_accessibility_qa\n- frontend_bias_check\n\nfrontend_bias_check must contain:\n\n- old_frontend_was_used_as_reference\n- old_frontend_behavior_used_as_baseline\n- old_frontend_patterns_reused\n- current_frontend_audited_only_as_new_implementation\n- confidence_of_isolation\n\nProduce a structured artifact named:\n\nbrowser_performance_qa_report\n"
  output_format:
    type: object
