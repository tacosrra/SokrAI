services:
  postgres:
    pull_policy: always
    volumes:
      - sokrai_beta_postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro

  ollama:
    pull_policy: always
    dns:
      - ${BETA_OLLAMA_DNS_PRIMARY:-1.1.1.1}
      - ${BETA_OLLAMA_DNS_SECONDARY:-8.8.8.8}
    volumes:
      - sokrai_beta_ollama_data:/root/.ollama

  api:
    image: sokrai-beta-api
    pull_policy: build
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./contracts:/app/contracts:ro
      - ./prompts:/app/prompts:ro
      - ./db:/app/db:ro
    command: ["sh", "-c", "pnpm --filter @sokrai/api build && exec node apps/api/dist/index.js"]

  web:
    image: sokrai-beta-web
    pull_policy: build
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/index.html:/app/apps/web/index.html:ro
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts:ro

  n8n:
    pull_policy: always

volumes:
  sokrai_beta_postgres_data:
  sokrai_beta_ollama_data:
