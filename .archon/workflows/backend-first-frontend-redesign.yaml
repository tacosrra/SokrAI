    - Verify no obvious performance regressions exist.

    RESPONSIVE REGRESSION QA

    Re-test important routes across:

    - Desktop viewport
    - Tablet viewport
    - Mobile viewport

    For each viewport verify:

    - No horizontal overflow
    - No clipped critical content
    - No overlapping components
    - Navigation remains usable
    - Primary actions remain visible or reachable
    - Text remains readable
    - Touch target intent remains reasonable
    - Information hierarchy is preserved

    VISUAL FIDELITY REGRESSION QA

    Verify that the post-fix implementation still preserves:

    - final_visual_design_blueprint
    - selected visual direction
    - visual hierarchy
    - screen composition
    - layout principles
    - typography direction
    - color direction
    - component system direction
    - product personality
    - premium visual quality

    The UI must not regress into generic SaaS/dashboard design.

    REACT REGRESSION QA

    Re-check changed components and areas related to previous React Doctor
    findings.

    Verify:

    - No new unnecessary broad state ownership
    - No new excessive prop drilling
    - No new unstable props where avoidable
    - No new unnecessary effects
    - No new obvious render loops
    - No new excessive abstraction
    - No new unnecessary memoization
    - Component responsibilities remain clear

    Do not claim runtime rerender confirmation unless supported by browser,
    profiling or clear code evidence.

    PERFORMANCE REGRESSION QA

    Re-check performance-sensitive areas:

    - Routes changed by fixes
    - Data-heavy screens
    - Dashboard screens
    - Forms with dynamic behavior
    - Lists/tables/charts
    - Interactions flagged by previous performance QA
    - Mobile viewport behavior

    Verify:

    - No obvious interaction slowdown
    - No severe main-thread blocking symptoms
    - No new layout instability
    - No new large asset/network issue
    - No performance fix degraded visual quality or accessibility

    Use performance traces only where needed to validate important or
    suspicious regressions.

    ACCESSIBILITY REGRESSION QA

    Re-check accessibility-sensitive areas:

    - Keyboard navigation
    - Focus visibility
    - Focus order
    - Forms
    - Dialogs/drawers/menus
    - Buttons/links/inputs
    - Landmark structure
    - Heading structure
    - Accessible names
    - Error/loading/empty states
    - Responsive accessibility

    Verify:

    - Accessibility fixes improved or preserved accessibility.
    - Visual fixes did not create accessibility regressions.
    - Performance fixes did not create accessibility regressions.
    - Keyboard-only use remains possible for critical journeys.

    DESIGN / ACCESSIBILITY / PERFORMANCE BALANCE

    Evaluate whether the final implementation keeps a healthy balance between:

    - Visual ambition
    - UX clarity
    - Accessibility
    - Performance
    - Maintainability

    Do not require lowering design quality unless there is a verified blocker.

    ARTIFACT CAPTURE REQUIREMENTS

    For every important tested route and viewport:

    - Record tested URL.
    - Record tested viewport.
    - Capture screenshot evidence where useful.
    - Capture browser/DOM snapshot where useful.
    - Capture accessibility tree snapshot where useful.
    - Record console/network observations.
    - Record whether the route was fully testable.

    Use stable artifact naming:

    - final-regression-qa/<route-slug>/<viewport-name>-screenshot
    - final-regression-qa/<route-slug>/<viewport-name>-snapshot
    - final-regression-qa/<route-slug>/<viewport-name>-a11y-snapshot
    - final-regression-qa/<route-slug>/<viewport-name>-runtime-notes

    EVIDENCE LEVEL RULE

    For every final finding classify evidence_level as:

    - confirmed_regression
    - likely_regression_risk
    - unresolved_existing_issue
    - resolved_issue_verified
    - requires_follow_up_validation

    Do not claim a regression is confirmed unless observed through validation,
    browser evidence, automated test output or clear code evidence.

    RELEASE BLOCKER RULE

    Mark final_workflow_status as blocked if any of the following are true:

    - Build fails.
    - App cannot load.
    - Primary route crashes.
    - Primary user journey is unusable.
    - Keyboard navigation blocks a critical journey.
    - Critical accessibility issue remains unresolved.
    - Critical visual regression breaks usability.
    - Critical performance issue makes the app unusable.
    - Fix implementation introduced untraceable high-risk changes.

    RELEASE READINESS SCORING

    Score each dimension from 1 to 10:

    - build_health
    - test_health
    - visual_regression_safety
    - ux_regression_safety
    - responsive_regression_safety
    - react_architecture_safety
    - performance_regression_safety
    - accessibility_regression_safety
    - design_fidelity_preservation
    - release_confidence

    RELEASE DECISION LOGIC

    Set final_workflow_status to one of:

    - ready_for_human_review
    - ready_with_known_limitations
    - requires_additional_fix_iteration
    - blocked

    Use:

    - ready_for_human_review if all critical validations pass, no blocking
      regressions are found, and release_confidence is high.
    - ready_with_known_limitations if non-blocking issues remain but they are
      clearly documented and acceptable for human review.
    - requires_additional_fix_iteration if important fixable regressions remain.
    - blocked if build, runtime, primary journeys, accessibility, routing or
      critical usability are broken.

    ITERATION ROUTING

    If final_workflow_status is requires_additional_fix_iteration or blocked,
    recommend the next node to resume from:

    - consolidated-qa-fix-plan
    - consolidated-fix-implementation
    - frontend-implementation
    - human-review-required

    Include the reason for the routing decision.

    FINAL HUMAN HANDOFF

    Produce a concise human-readable handoff containing:

    - What was redesigned.
    - What was implemented.
    - What was fixed.
    - What passed validation.
    - What still needs human review.
    - What limitations remain.
    - Whether the frontend is ready to manually inspect.

    FINAL OUTPUT

    Must include:

    - final_regression_qa_summary
    - final_workflow_status
    - validation_commands_discovered
    - validation_commands_run
    - validation_results
    - static_validation_status
    - tested_routes
    - tested_viewports
    - tested_user_journeys
    - regression_artifacts
    - fix_plan_compliance_check
    - canonical_issue_resolution_matrix
    - resolved_issues_verified
    - partially_resolved_issues
    - unresolved_issues
    - new_regressions_detected
    - likely_regression_risks
    - visual_regression_findings
    - responsive_regression_findings
    - react_regression_findings
    - performance_regression_findings
    - accessibility_regression_findings
    - console_network_regression_findings
    - design_fidelity_final_assessment
    - accessibility_final_assessment
    - performance_final_assessment
    - release_readiness_scorecard
    - evidence_level_by_finding
    - remaining_known_limitations
    - recommended_next_actions
    - recommended_resume_node
    - iteration_reasoning
    - human_review_notes
    - final_human_handoff
    - final_frontend_quality_summary
    - frontend_bias_check

    frontend_bias_check must contain:

    - old_frontend_was_used_as_reference
    - old_frontend_behavior_used_as_baseline
    - old_frontend_patterns_reused
    - current_frontend_validated_only_as_new_implementation
    - confidence_of_isolation

    Produce a structured artifact named:

    final_regression_qa_report
  output_format:
    type: object
    additionalProperties: true
