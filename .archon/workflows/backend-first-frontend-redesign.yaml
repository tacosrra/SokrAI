    Use Chrome DevTools MCP to inspect the real application in Chrome.

    Use browser evidence whenever possible:

    - Accessibility tree snapshots
    - DOM snapshots
    - Keyboard navigation observations
    - Focus behavior observations
    - Console/runtime accessibility-related warnings where available
    - Screenshots only when useful to document visible accessibility issues
    - Runtime observations from real user interactions

    Do not rely only on static code inspection.

    SCOPE BOUNDARY

    This node is responsible for accessibility QA.

    Focus on:

    - Keyboard navigation
    - Focus visibility
