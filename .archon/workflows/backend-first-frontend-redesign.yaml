name: backend-first-frontend-redesign
description: |
  Backend-first frontend redesign workflow.
  Existing frontend implementations are contaminated context and must not
  influence future UX/UI decisions.

    The workflow can use Graphify as a repository navigation layer to reduce broad code scanning while preserving strict frontend isolation.
provider: codex
model: gpt-5.5
modelReasoningEffort: medium
interactive: true
nodes:
- id: discovery
  name: Product & UX Discovery
  loop:
    prompt: |-
      You are the discovery phase of a backend-first frontend design workflow.

      You are running as an interactive loop. You must gather all required product,
      user, business, UX and technical context before the workflow continues.

      CURRENT USER FEEDBACK / ANSWERS FROM INTERACTIVE GATE:
      $LOOP_USER_INPUT

      PREVIOUS LOOP OUTPUT:
      $LOOP_PREV_OUTPUT

      IMPORTANT RULES:

      - You are NOT allowed to inspect, analyze, critique, review or use any
        existing frontend implementation.
      - The future design must be created entirely from user answers, product goals,
        backend architecture, target users and business requirements.
      - Never make assumptions.
      - If information is missing, ask.
      - If something is ambiguous, clarify.
      - If something could influence UX decisions, ask.
      - Do not analyze backend yet.
      - Do not design UX yet.
      - Do not design UI yet.

      INTERACTION PROTOCOL:

      - If no useful user answers have been provided yet, ask a complete but concise
        checklist of questions and do NOT output the completion promise.
      - After each user response, identify remaining gaps.
      - Continue asking follow-up questions only for gaps that are relevant.
      - Stop only when all blocking unknowns are resolved or explicitly accepted as
        unknown by the user.
      - When the discovery is complete, output only the final discovery_report JSON
        object followed by the completion promise: <promise>DISCOVERY_COMPLETE</promise>

      Areas that must be covered:

      1. Product vision and goals
      2. User types and personas
      3. User technical expertise
      4. User pain points
      5. Core workflows
      6. Business objectives
      7. Success metrics
      8. Platforms and devices
      9. Accessibility requirements
      10. Visual preferences
      11. Branding constraints
      12. Data density expectations
      13. Security considerations
      14. Integrations
      15. Performance expectations
      16. Real-time requirements
      17. Future scalability requirements

      Final discovery_report JSON must include:

      - product_summary
      - target_users
      - user_pain_points
      - core_workflows
      - required_screens
      - critical_data
      - ux_priorities
      - visual_direction
      - technical_constraints
      - performance_expectations
      - accessibility_requirements
      - integrations
      - blocking_unknowns
      - non_blocking_unknowns
      - explicit_user_preferences
      - forbidden_assumptions
      - readiness_score

      If blocking unknowns remain, do not complete. Ask the next focused set of
      questions instead.
    until: DISCOVERY_COMPLETE
    max_iterations: 6
    fresh_context: true
    interactive: true
    gate_message: Answer the discovery questions above. If you believe all context is now complete, say so explicitly; otherwise provide the missing product, user, UX, technical and business details.
- id: graphify-codebase-map
  name: Graphify Codebase Map
  depends_on:
  - discovery
  provider: codex
  model: gpt-5.5
  modelReasoningEffort: medium
  context: fresh
  prompt: |-
    You are the Graphify codebase mapping phase of a backend-first frontend design workflow.

    Your mission is to create or refresh a concise, queryable Graphify-based map of the repository before backend analysis and frontend implementation planning begin.

    This node may create or refresh Graphify artifacts, but it must not modify application source code.

    IMPORTANT RULES

    - Do not design UX.
    - Do not design UI.
    - Do not implement frontend code.
    - Do not modify application source files.
    - Do not inspect old frontend UI, component, layout or style content for inspiration.
    - Do not use existing frontend UX/UI as product context.
    - Existing frontend implementation remains contaminated context.
    - Use Graphify for repository navigation and technical orientation only.

    INPUTS

    Use:

    - discovery_report:
      $discovery.output
    - current repository
    - existing Graphify artifacts if present

    GRAPHIFY AVAILABILITY CHECK

    Determine whether Graphify is available in the repository.

    Check safely for:

    - Existing graphify output directories or files.
    - Project scripts that run Graphify.
    - Installed Graphify CLI or project dependency.
    - Existing graph.html, GRAPH_REPORT.md, graph.json or equivalent artifacts.

    Do not install new dependencies unless the repository already defines Graphify as a project dependency or script and the install/update is part of normal project setup.

    GRAPHIFY EXECUTION RULE

    If Graphify is available and safe to run:

    - Refresh or create the Graphify graph.
    - Prefer project-defined scripts over guessing commands.
    - Keep generated artifacts in the repository's expected Graphify output location.
    - Do not modify application source code.

    If Graphify is not available or cannot run safely:

    - Do not fail the workflow solely because Graphify is unavailable.
    - Produce a best-effort codebase map using safe repository navigation.
    - Mark graphify_available as false.
    - Document limitations clearly.

    FRONTEND CONTAMINATION CONTROL

    Graphify may reveal frontend files in the repository graph.

    You may use frontend-related graph information only to identify:

    - Frontend technical entry points.
    - Framework setup.
    - Build configuration.
    - Routing mechanics.
    - Package/dependency boundaries.
    - Files/directories that may need replacement later.

    You must not use Graphify to learn from or preserve:

    - Existing frontend UX decisions.
    - Existing frontend UI decisions.
    - Existing screen layouts.
    - Existing component structure.
    - Existing styling.
    - Existing design system choices.
    - Existing visual hierarchy.
    - Existing navigation patterns, except where required by framework routing mechanics.

    If Graphify exposes frontend design information accidentally, ignore it.

    REPOSITORY MAP OBJECTIVES

    Use Graphify artifacts and safe targeted inspection to identify:

    - Backend entry points.
    - API routes and controllers.
    - Database/schema files.
    - Domain entities.
    - Service boundaries.
    - Business logic modules.
    - Auth/permission modules.
    - Infrastructure/config files.
    - Build/test/package commands.
    - Dependency hotspots.
    - Cross-cutting modules.
    - Frontend technical entry points only.

    GRAPHIFY OUTPUT SIZE CONTROL

    Do not copy large graph.json contents into the final output.

    Produce a concise map with references, paths and recommended queries.

    Prefer:

    - Important paths.
    - Important modules.
    - Important relationships.
    - High-value Graphify queries for later nodes.
    - Limitations and confidence notes.

    Do not produce a huge raw graph dump.

    LATER NODE HANDOFF

    Prepare a map that helps later nodes inspect the repository efficiently without broad file scans.

    For later nodes, recommend targeted Graphify-guided queries for:

    - Backend/domain analysis.
    - API and data contract analysis.
    - Implementation planning.
    - Frontend technical replacement boundaries.
    - React component audit of the new implementation.
    - Consolidated fix implementation.

    FINAL OUTPUT

    Must include:

    - graphify_available
    - graphify_graph_refreshed
    - graphify_command_used
    - graphify_artifacts_found
    - graphify_artifacts_created
    - graphify_artifact_paths
    - backend_entry_points
    - api_entry_points
    - domain_model_candidates
    - database_schema_candidates
    - service_boundary_candidates
    - auth_permission_candidates
    - infrastructure_config_candidates
    - build_test_commands_detected
    - dependency_hotspots
    - frontend_technical_entry_points_only
    - frontend_contamination_risk_notes
    - recommended_graphify_queries_for_later_nodes
    - graphify_usage_rules_for_later_nodes
    - graphify_limitations
    - confidence_level

    frontend_bias_check must contain:

    - frontend_was_used_for_design
    - frontend_ui_content_analyzed
    - frontend_artifacts_used_only_for_technical_boundaries
    - frontend_contamination_risk
    - confidence_of_isolation

    Produce a structured artifact named:

    graphify_codebase_map
  output_format:
    type: object
    additionalProperties: true
