    Do not perform general visual QA here.
    Do not perform performance trace QA here.
    Do not implement accessibility fixes here.

    ACCESSIBILITY STANDARD

    Use WCAG 2.2 A/AA as the default evaluation target unless the project
    defines a different accessibility target.

    Organize findings where possible under:

    - Perceivable
    - Operable
    - Understandable
    - Robust

    WCAG TRACEABILITY RULE

    For every accessibility issue, classify it as:

    - wcag_failure
    - likely_wcag_risk
    - accessibility_ux_concern
    - best_practice_issue
    - requires_specialized_testing

    Do not label an issue as wcag_failure unless a specific WCAG 2.2
    success criterion can be reasonably identified.

    If a finding is based on best practice rather than a clear WCAG issue,
    mark it as best_practice_issue.

    ASSISTIVE TECHNOLOGY LIMITATION

    Do not claim that the product is screen-reader validated unless real
    screen reader testing was performed.

    If only accessibility tree snapshots were inspected, state that findings
    are browser accessibility tree observations, not full assistive technology
    validation.

    AUTOMATED ACCESSIBILITY TOOLING DISCOVERY

    Before finalizing the report, identify whether the project already has
    safe accessibility validation commands available, such as:

    - axe
    - jest-axe
    - playwright accessibility checks
    - lighthouse accessibility
    - eslint-jsx-a11y
    - existing accessibility test scripts

    Run them only if they are already configured and safe to execute.

    Treat automated results as supporting evidence, not as complete proof of
    accessibility.

    SERVER / APP AVAILABILITY CHECK

    Before accessibility QA:

    - Determine the local application URL.
    - Start or reuse the application server if required.
    - Verify that the app loads in Chrome.
    - If the app cannot load, mark this node as blocked and document why.
    - Do not attempt broad fixes in this node.

    ROUTE AND SCREEN COVERAGE

    Inspect every implemented screen listed in frontend_implementation_report,
    prioritizing:

    - Primary user journey screens
    - Screens with forms
    - Screens with dialogs, menus, drawers or popovers
    - Screens with tables, lists, charts or dense data
    - Screens flagged by chrome_visual_qa_report
    - Screens flagged by browser_performance_qa_report

    For each important screen:

    - Navigate to the route.
    - Wait for the page to finish loading.
    - Capture accessibility tree snapshot evidence where useful.
    - Check heading structure.
    - Check landmark structure.
    - Check accessible names.
    - Check keyboard navigation.
    - Check focus visibility.
    - Check focus order.
    - Check form labels.
    - Check error messaging.
    - Check semantic structure.
    - Check state announcements where observable.
    - Check whether the route is fully testable.

    KEYBOARD QA

    For each primary screen and journey:

    - Navigate using keyboard only.
    - Verify all interactive elements are reachable.
    - Verify focus order is logical.
    - Verify focus is visible.
    - Verify focus is not trapped except inside modal/dialog contexts.
    - Verify skip/landmark navigation where applicable.
    - Verify escape/close behavior for dialogs, drawers, menus and popovers.
    - Verify no keyboard dead ends exist.

    INTERACTIVE COMPONENT QA

    Evaluate:

    - Buttons
    - Links
    - Inputs
    - Selects
    - Comboboxes
    - Checkboxes
    - Radios
    - Toggles
    - Tabs
    - Menus
    - Dialogs
    - Drawers
    - Tooltips
    - Tables
    - Charts
    - Cards with actions
    - Search/filter controls

    For each relevant component type check:

    - Correct semantic role
    - Accessible name
    - Keyboard interaction
    - Focus behavior
    - Disabled state behavior
    - Error state behavior
    - Loading state behavior
    - ARIA only when needed and used correctly

    FORM ACCESSIBILITY QA

    For forms:

    - Every input has a programmatically associated label.
    - Help text is associated where needed.
    - Validation errors are clear and associated with fields.
    - Required fields are communicated accessibly.
    - Error summaries exist where appropriate.
    - Keyboard-only completion is possible.
    - Focus moves predictably after submit or validation failure.
    - Placeholder text is not the only label.

    SEMANTIC STRUCTURE QA

    Check:

    - Heading order is logical.
    - Landmarks are meaningful.
    - Navigation regions are identifiable.
    - Main content is identifiable.
    - Lists are represented as lists where appropriate.
    - Tables use correct table semantics when applicable.
    - Clickable div/span patterns are avoided.
    - Icons with meaning have accessible names.
    - Decorative icons are hidden from assistive technologies.

    ARIA QA

    Check:

    - ARIA is not used where native HTML is sufficient.
    - ARIA roles match component behavior.
    - aria-label/aria-labelledby/aria-describedby are used correctly.
    - aria-expanded, aria-selected, aria-current and aria-invalid are accurate.
    - Hidden content is not exposed incorrectly.
    - Visible content is not accidentally hidden from assistive technologies.

    STATES ACCESSIBILITY QA

    Check accessibility of:

    - Loading states
    - Empty states
    - Error states
    - Permission states
    - Disabled states
    - Success states
    - Toasts/notifications
    - Inline validation
    - Background updates where applicable

    RESPONSIVE ACCESSIBILITY QA

    Test important screens across:

    - Desktop viewport
    - Tablet viewport
    - Mobile viewport

    For each viewport evaluate:

    - Keyboard/touch usability
    - Focus visibility
    - Reading order
    - Touch target intent
    - Hidden content behavior
    - Navigation accessibility
    - Modal/drawer/menu accessibility

    CONTRAST AND VISUAL ACCESSIBILITY

    Evaluate visible contrast concerns where observable.

    Check:

    - Text contrast intent
    - Interactive control contrast
    - Focus indicator contrast
    - Disabled state clarity
    - Error/success/warning state distinguishability
    - Reliance on color alone

